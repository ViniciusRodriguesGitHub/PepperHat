    /* PWA Install Prompt */

    .pwa-install-prompt.hide {

  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('[PWA] Service Worker registered:', registration.scope);
          })
          .catch((error) => {
            console.log('[PWA] Service Worker registration failed:', error);
          });
      });
    }
    
    // PWA Install Prompt
    let deferredPrompt;
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    
    window.addEventListener('beforeinstallprompt', (e) => {
      console.log('[PWA] Install prompt available');
      e.preventDefault();
      deferredPrompt = e;
      showInstallPrompt();
    });
    
    function showInstallPrompt() {
      if (isStandalone) return;
      
      const container = document.getElementById('pwa-prompt-container');
      if (!container) return;
      
      // iOS uses a different install method
      if (isIOS) {
        showIOSInstallGuide();
        return;
      }
      
      const prompt = document.createElement('div');
      prompt.className = 'pwa-install-prompt';
      prompt.innerHTML = `
        <img src="icons/icon-72x72.png" alt="Consenso" class="w-12 h-12 rounded-xl">
        <div class="flex-1">
          <p class="font-semibold text-slate-900">Instalar Consenso</p>
          <p class="text-sm text-slate-500">Acesse rapidamente do seu dispositivo</p>
        </div>
        <button id="install-btn" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors">
          Instalar
        </button>
        <button id="dismiss-btn" class="p-2 text-slate-400 hover:text-slate-600">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      `;
      
      container.appendChild(prompt);
      
      document.getElementById('install-btn').addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log('[PWA] User choice:', outcome);
          deferredPrompt = null;
        }
        prompt.classList.add('hide');
        setTimeout(() => prompt.remove(), 300);
      });
      
      document.getElementById('dismiss-btn').addEventListener('click', () => {
        prompt.classList.add('hide');
        setTimeout(() => prompt.remove(), 300);
        localStorage.setItem('pwa-prompt-dismissed', Date.now().toString());
      });
    }
    
    function showIOSInstallGuide() {
      const container = document.getElementById('ios-guide-container');
      if (!container || localStorage.getItem('ios-guide-shown')) return;
      
      const guide = document.createElement('div');
      guide.className = 'ios-install-guide';
      guide.innerHTML = `
        <div class="ios-install-content">
          <img src="icons/icon-152x152.png" alt="Consenso" class="w-20 h-20 mx-auto mb-4 rounded-2xl">
          <h2 class="text-xl font-bold text-slate-900 mb-2">Adicione à Tela Inicial</h2>
          <p class="text-slate-600 mb-6">Instale o Consenso para acesso rápido:</p>
          <div class="space-y-4 text-left bg-slate-50 p-4 rounded-xl mb-6">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">1</div>
              <span class="text-slate-700">Toque no botão <strong>Compartilhar</strong></span>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">2</div>
              <span class="text-slate-700">Role e toque em <strong>Adicionar à Tela de Início</strong></span>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">3</div>
              <span class="text-slate-700">Toque em <strong>Adicionar</strong></span>
            </div>
          </div>
          <button id="ios-close-btn" class="w-full py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition-colors">
            Entendi
          </button>
        </div>
      `;
      
      container.appendChild(guide);
      
      document.getElementById('ios-close-btn').addEventListener('click', () => {
        guide.remove();
        localStorage.setItem('ios-guide-shown', 'true');
      });
    }
    
    // Show prompt after 3 seconds if not dismissed recently
    setTimeout(() => {
      if (isStandalone) return;
      
      const dismissed = localStorage.getItem('pwa-prompt-dismissed');
      if (dismissed && Date.now() - parseInt(dismissed) < 7 * 24 * 60 * 60 * 1000) return;
      
      if (deferredPrompt || isIOS) {
        showInstallPrompt();
      }
    }, 3000);
    
    // Listen for app installed event
    window.addEventListener('appinstalled', () => {
      console.log('[PWA] App installed');
      deferredPrompt = null;
      const prompt = document.querySelector('.pwa-install-prompt');
      if (prompt) prompt.remove();
    });
  </script>
  
  <script type="text/babel">
    const { useState, useEffect, useLayoutEffect, useRef } = React;
    
    // Logo SVG Component
    const Logo = ({ className = "w-8 h-8" }) => (
      <svg viewBox="0 0 100 100" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="20" r="12" fill="#2563eb"/>
        <circle cx="80" cy="50" r="12" fill="#475569"/>
        <circle cx="50" cy="80" r="12" fill="#2563eb"/>
        <circle cx="20" cy="50" r="12" fill="#475569"/>
        <path d="M50 32 L50 68" stroke="#2563eb" strokeWidth="6" strokeLinecap="round"/>
        <path d="M32 50 L68 50" stroke="#475569" strokeWidth="6" strokeLinecap="round"/>
        <circle cx="50" cy="50" r="8" fill="#1e40af"/>
      </svg>
    );

    const Icon = ({ name, className = "w-5 h-5" }) => {
      const iconRef = useRef(null);
      useEffect(() => {
        if (iconRef.current && lucide[name]) {
          iconRef.current.innerHTML = '';
          const svg = lucide.createElement(lucide[name]);
          svg.setAttribute('class', className);
          iconRef.current.appendChild(svg);
        }
      }, [name, className]);
      return <span ref={iconRef} className="inline-flex items-center justify-center" />;
    };

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [onClose]);
      const bgColors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
      return (
        <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 ${bgColors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 fade-in flex items-center gap-2`}>
          <Icon name={type === 'success' ? 'CheckCircle' : type === 'error' ? 'XCircle' : 'Info'} className="w-5 h-5" />
          {message}
        </div>
      );
    };

    const Toaster = ({ toasts, removeToast }) => (
      <>{toasts.map(t => <Toast key={t.id} message={t.message} type={t.type} onClose={() => removeToast(t.id)} />)}</>
    );

    const generateId = () => Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
    const formatDate = (date) => date.toISOString().split('T')[0];
    const formatDisplayDate = (date) => new Date(date).toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'short' });
    const formatDisplayDateFull = (date) => new Date(date).toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
    
    const getDatesInRange = (start, end) => {
      const dates = [];
      let current = new Date(start);
      const endDate = new Date(end);
      while (current <= endDate) { dates.push(new Date(current)); current.setDate(current.getDate() + 1); }
      return dates;
    };
    
    const getDayName = (date) => date.toLocaleDateString('pt-BR', { weekday: 'short' });
    const getDayNumber = (date) => date.getDate();
    const getMonthName = (date) => date.toLocaleDateString('pt-BR', { month: 'short' });
    const getTimezoneDisplay = () => {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const offset = new Date().getTimezoneOffset();
      const sign = offset <= 0 ? '+' : '-';
      const hours = Math.floor(Math.abs(offset) / 60);
      return `GMT${sign}${hours} ${tz.split('/').pop().replace(/_/g, ' ')}`;
    };

    const HOUR_SLOTS = ['06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];
    const SHIFT_TIMES = { morning: 'Manhã (6h-12h)', afternoon: 'Tarde (12h-18h)', evening: 'Noite (18h-22h)' };
    const SEPARATOR_HOURS = ['12:00', '18:00'];

    const STORAGE_KEY = 'consenso_events';
    const USER_KEY = 'consenso_user';
    const ADMIN_SESSION_KEY = 'consenso_admin_session';

    const getGoogleClientId = () => {
      try {
        const id = typeof window !== 'undefined' && window.CONSENSO_GOOGLE_CLIENT_ID;
        return id ? String(id).trim() : '';
      } catch { return ''; }
    };

    /** Carrega https://accounts.google.com/gsi/client uma vez; trata script já presente ou já carregado. */
    const loadGoogleIdentityScript = () => {
      if (typeof window === 'undefined') return Promise.reject(new Error('Sem window'));
      if (window.google?.accounts?.id) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const sel = 'script[data-consenso-gis="1"]';
        const existing = document.querySelector(sel);
        const finish = () => {
          if (window.google?.accounts?.id) resolve();
          else reject(new Error('Google Identity Services indisponível após carregar o script.'));
        };
        if (existing) {
          if (window.google?.accounts?.id) return finish();
          existing.addEventListener('load', finish);
          existing.addEventListener('error', () => reject(new Error('Erro ao carregar o script do Google.')));
          queueMicrotask(() => {
            if (window.google?.accounts?.id) finish();
          });
          return;
        }
        const s = document.createElement('script');
        s.src = 'https://accounts.google.com/gsi/client';
        s.async = true;
        s.defer = true;
        s.setAttribute('data-consenso-gis', '1');
        s.onload = finish;
        s.onerror = () => reject(new Error('Erro ao carregar o script do Google.'));
        document.head.appendChild(s);
      });
    };

    const parseJwtPayload = (token) => {
      try {
        const part = token.split('.')[1];
        if (!part) return null;
        let base64 = part.replace(/-/g, '+').replace(/_/g, '/');
        const pad = base64.length % 4;
        if (pad) base64 += '='.repeat(4 - pad);
        const json = decodeURIComponent(atob(base64).split('').map((c) => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        return JSON.parse(json);
      } catch { return null; }
    };

    const getAdminSession = () => {
      try {
        const s = localStorage.getItem(ADMIN_SESSION_KEY);
        return s ? JSON.parse(s) : null;
      } catch { return null; }
    };

    const setAdminSession = (session) => {
      localStorage.setItem(ADMIN_SESSION_KEY, JSON.stringify(session));
    };

    const clearAdminSession = () => {
      localStorage.removeItem(ADMIN_SESSION_KEY);
    };

    const adminKey = (session) => {
      if (!session) return null;
      if (session.provider === 'google' && session.sub) return `google:${session.sub}`;
      if (session.provider === 'email' && session.email) return `email:${session.email.trim().toLowerCase()}`;
      return null;
    };

    const canManageEventId = (eventId) => {
      const event = getEvent(eventId);
      if (!event) return false;
      const session = getAdminSession();
      const key = adminKey(session);
      if (key && event.config.creatorAdminKey === key) return true;
      if (!event.config.creatorAdminKey) {
        const u = getCurrentUser();
        return event.config.creatorId === u.id;
      }
      return false;
    };

    const getEventsForAdmin = () => {
      const session = getAdminSession();
      const key = adminKey(session);
      if (!key) return [];
      const events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      return Object.keys(events)
        .filter((id) => events[id].config.creatorAdminKey === key)
        .map((id) => ({ id, ...events[id] }))
        .sort((a, b) => new Date(b.config.createdAt) - new Date(a.config.createdAt));
    };
    
    const getCurrentUser = () => {
      const stored = localStorage.getItem(USER_KEY);
      if (stored) return JSON.parse(stored);
      const newUser = { id: generateId(), name: '', isAnonymous: true };
      localStorage.setItem(USER_KEY, JSON.stringify(newUser));
      return newUser;
    };
    
    const setUserName = (name) => {
      const user = getCurrentUser();
      user.name = name;
      localStorage.setItem(USER_KEY, JSON.stringify(user));
    };
    
    const createEvent = (config) => {
      const admin = getAdminSession();
      const ak = adminKey(admin);
      if (!ak) throw new Error('Organizador não autenticado');
      const events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const newConfig = {
        ...config,
        id: generateId(),
        createdAt: new Date().toISOString(),
        resultsUnlocked: false,
        creatorAdminKey: ak || undefined,
        creatorAdminEmail: admin?.email || undefined
      };
      events[newConfig.id] = { config: newConfig, votes: [] };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
      return newConfig;
    };
    
    const getEvent = (eventId) => {
      const events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const event = events[eventId];
      if (!event) return null;
      return {
        config: { ...event.config, startDate: new Date(event.config.startDate), endDate: new Date(event.config.endDate), createdAt: new Date(event.config.createdAt) },
        votes: event.votes.map(v => ({ ...v, votedAt: new Date(v.votedAt) }))
      };
    };
    
    const submitVote = (eventId, vote) => {
      const events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const event = events[eventId];
      if (!event) throw new Error('Event not found');
      event.votes = event.votes.filter(v => v.userId !== vote.userId);
      event.votes.push({ ...vote, votedAt: new Date().toISOString() });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
    };
    
    const hasUserVoted = (eventId, userId) => {
      const event = getEvent(eventId);
      return event ? event.votes.some(v => v.userId === userId) : false;
    };
    
    const getUserVote = (eventId, userId) => {
      const event = getEvent(eventId);
      return event ? event.votes.find(v => v.userId === userId) || null : null;
    };
    
    const unlockResults = (eventId) => {
      const events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (events[eventId]) {
        events[eventId].config.resultsUnlocked = true;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
      }
    };
    
    const getVotedUserNames = (eventId) => {
      const event = getEvent(eventId);
      return event ? event.votes.map(v => v.userName).filter(Boolean) : [];
    };
    
    const generateShortLink = (eventId) => `${window.location.origin}${window.location.pathname}#event/${eventId}`;

    const calculateConsensus = (eventData) => {
      const { config, votes } = eventData;
      if (votes.length === 0) return { type: 'none', slots: [], totalVotes: 0, quorum: config.quorum };
      
      const slotMap = new Map();
      votes.forEach(vote => {
        vote.timeSlots.forEach(slotKey => {
          if (!slotMap.has(slotKey)) {
            const [dateStr, time] = slotKey.split('|');
            slotMap.set(slotKey, { date: new Date(dateStr), time, votes: 0, voterIds: [] });
          }
          const slot = slotMap.get(slotKey);
          slot.votes++;
          slot.voterIds.push(vote.userId);
        });
      });
      
      const slots = Array.from(slotMap.values());
      const unanimousSlots = slots.filter(s => s.votes === votes.length).sort((a, b) => a.date - b.date || a.time.localeCompare(b.time));
      
      if (unanimousSlots.length > 0) return { type: 'unanimous', slots: unanimousSlots.slice(0, 2), totalVotes: votes.length, quorum: config.quorum };
      
      const maxVotes = Math.max(...slots.map(s => s.votes));
      const majoritySlots = slots.filter(s => s.votes === maxVotes).sort((a, b) => a.date - b.date || a.time.localeCompare(b.time)).slice(0, 2);
      
      return { type: 'majority', slots: majoritySlots, totalVotes: votes.length, quorum: config.quorum };
    };
    
    const hasReachedQuorum = (eventData) => eventData.votes.length >= eventData.config.quorum;
    const hasReachedEarlyRevelationThreshold = (eventData) => eventData.config.earlyRevelation && eventData.votes.length >= Math.ceil(eventData.config.quorum * 0.5);
    const canViewResults = (eventData, isManager) => eventData.config.resultsUnlocked || hasReachedQuorum(eventData);
    const getMissingVotesCount = (eventData) => Math.max(0, eventData.config.quorum - eventData.votes.length);

      return `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Consenso//EN\nBEGIN:VEVENT\nUID:${Date.now()}@consenso.app\nDTSTAMP:${formatDate(new Date())}\nDTSTART:${formatDate(event.startDate)}\nDTEND:${formatDate(event.endDate)}\nSUMMARY:${event.title}\nDESCRIPTION:${event.description || 'Reunião via Consenso'}\nEND:VEVENT\nEND:VCALENDAR`;
    };
    
    const downloadICal = (event) => {
      const content = generateICalContent(event);
      const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `consenso-${event.title.toLowerCase().replace(/\s+/g, '-')}.ics`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    };
    
    const openGoogleCalendar = (event) => {
      const formatDate = (d) => d.toISOString().replace(/[-:]/g, '').split('.')[0];
      const params = new URLSearchParams({ action: 'TEMPLATE', text: event.title, dates: `${formatDate(event.startDate)}/${formatDate(event.endDate)}`, details: event.description || 'Reunião via Consenso' });
      window.open(`https://calendar.google.com/calendar/render?${params.toString()}`, '_blank');
    };
    
    const parseTimeSlot = (slotKey, title) => {
      const [dateStr, timeStr] = slotKey.split('|');
      const date = new Date(dateStr);
      
      if (timeStr === 'morning') {
        const start = new Date(date); start.setHours(6, 0, 0, 0);
        const end = new Date(date); end.setHours(12, 0, 0, 0);
        return { title, startDate: start, endDate: end };
      } else if (timeStr === 'afternoon') {
        const start = new Date(date); start.setHours(12, 0, 0, 0);
        const end = new Date(date); end.setHours(18, 0, 0, 0);
        return { title, startDate: start, endDate: end };
      } else if (timeStr === 'evening') {
        const start = new Date(date); start.setHours(18, 0, 0, 0);
        const end = new Date(date); end.setHours(22, 0, 0, 0);
        return { title, startDate: start, endDate: end };
      } else if (timeStr.includes(':')) {
        const [hours, minutes] = timeStr.split(':').map(Number);
        const start = new Date(date); start.setHours(hours, minutes, 0, 0);
        const end = new Date(date); end.setHours(hours + 1, minutes, 0, 0);

                        className={`px-4 py-2 text-sm font-medium rounded-md transition-all ${granularity === g ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}>
                        {g === 'day' ? 'Dia Inteiro' : g === 'shift' ? 'Turnos' : 'Hora em Hora'}
                      </button>
                    ))}
                  </div>
                  <p className="text-sm text-slate-500 mt-2">
                    {granularity === 'day' && 'Os participantes votarão em dias inteiros'}
                    {granularity === 'shift' && 'Manhã (6h-12h), Tarde (12h-18h), Noite (18h-22h)'}
                    {granularity === 'hour' && 'Grade completa das 06:00 às 22:00'}
                  </p>
                </div>

                <div>
                  <Label className="flex items-center gap-2">
                    <Icon name="Users" className="w-4 h-4" />
                    Quórum Necessário
                  </Label>
                  <div className="space-y-2">
                    <div className="flex justify-between text-sm text-slate-500">
                      <span>2</span><span>25</span><span>50</span>
                    </div>
                    <Slider value={[Math.min(quorum, 50)]} onValueChange={handleQuorumSliderChange} min={2} max={50} step={1} />
                  </div>
                  <div className="flex items-center gap-4 mt-4">
                    <div>
                      <Label className="text-sm text-slate-500">Ou digite:</Label>
                      <Input type="number" min={2} value={quorumInput} onChange={handleQuorumInputChange} className="w-32" />
                    </div>
                    <div className="pt-6">
                      <p className="text-sm text-slate-600"><span className="font-semibold text-blue-600">{quorum}</span> participantes</p>
                      <p className="text-xs text-slate-500">Resultados só no fim</p>
                    </div>
                  </div>
                </div>

                <div>
                  <Label className="flex items-center gap-2">
                    <Icon name="Settings" className="w-4 h-4" />
                    Modo de Organizador
                  </Label>
                  <div className="grid grid-cols-2 gap-1 p-1 bg-slate-100 rounded-lg">
                    {['participant', 'administrative'].map(m => (
                      <button key={m} onClick={() => setManagerMode(m)} 
                        className={`px-4 py-2 text-sm font-medium rounded-md transition-all ${managerMode === m ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}>
                        {m === 'participant' ? 'Participa e Organiza' : 'Apenas Organiza'}
                      </button>
                    ))}
                  </div>
                  <p className="text-sm text-slate-500 mt-2">
                    {managerMode === 'participant' ? 'Você também poderá votar' : 'Você apenas organiza, sem votar'}
                  </p>
                </div>

                <div className="flex items-center justify-between p-4 bg-slate-50 rounded-lg border border-slate-200">
                  <div className="flex items-start gap-3">
                    <Icon name="Unlock" className="w-5 h-5 text-blue-600 mt-0.5" />
                    <div>
                      <Label className="text-slate-700 font-medium">Revelação Antecipada</Label>
                      <p className="text-sm text-slate-500">Permitir ver resultados com 50% dos votos + sua autorização</p>
                    </div>
                  </div>
                  <Switch checked={earlyRevelation} onCheckedChange={setEarlyRevelation} />
                </div>
              </div>

              <div className="p-6 border-t bg-slate-50 flex justify-between">
                <Button variant="outline" onClick={onCancel}>Cancelar</Button>
                <Button onClick={handleSubmit} disabled={isSubmitting || !title.trim()}>
                  {isSubmitting ? 'Criando...' : 'Criar Reunião'}
                </Button>
              </div>
            </Card>
          </main>
        </div>
      );
    };

    const ShareScreen = ({ event, onComplete, onBack, addToast }) => {
      const [copied, setCopied] = useState(false);
      const eventLink = generateShortLink(event.id);

      const handleCopyLink = async () => {
        try { await navigator.clipboard.writeText(eventLink); setCopied(true); addToast('Link copiado!', 'success'); setTimeout(() => setCopied(false), 2000); }
        catch { addToast('Erro ao copiar link', 'error'); }
      };

      const handleShareWhatsApp = () => {
        const text = `Oi! 📅\n\nEstou organizando "${event.title}" no Consenso.\n\nSeus horários serão 100% privados - ninguém verá o que você marcou!\n\nVote aqui: ${eventLink}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
      };

      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-white border-b border-slate-200">
            <div className="max-w-3xl mx-auto px-4 h-16 flex items-center justify-center">
              <div className="flex items-center gap-3">
                <Logo className="w-8 h-8" />
                <span className="text-xl font-bold text-slate-900">Consenso</span>
              </div>
            </div>
          </header>

          <main className="max-w-2xl mx-auto px-4 py-12">
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <Icon name="Check" className="w-8 h-8 text-green-600" />
              </div>
              <h1 className="text-2xl font-bold text-slate-900 mb-2">Reunião Criada!</h1>
              <p className="text-slate-600">Compartilhe o link para encontrar o consenso</p>
            </div>

            <Card className="mb-6 border-green-200">
              <CardContent className="p-4 bg-green-50">
                <div className="flex items-start gap-3">
                  <Icon name="ShieldCheck" className="w-5 h-5 text-green-600 mt-0.5" />
                  <div className="text-sm text-green-800">
                    <strong>Garantia de Privacidade:</strong> Os participantes verão apenas que votaram, 
                    mas <strong>nunca</strong> quais horários foram marcados. Nem você como organizador terá acesso.
                  </div>
                </div>
              </CardContent>
            </Card>

            <Card className="mb-6">
              <div className="p-6">
                <Label className="mb-2 block">Link da Reunião</Label>
                <div className="flex gap-2">
                  <Input value={eventLink} readOnly className="bg-slate-50 font-mono text-sm" />
                  <Button onClick={handleCopyLink} variant={copied ? 'primary' : 'outline'} className={copied ? 'bg-green-600' : ''}>
                    <Icon name={copied ? 'Check' : 'Copy'} className="w-5 h-5" />
                  </Button>
                </div>
              </div>
            </Card>

            <div className="grid grid-cols-2 gap-4 mb-8">
              <Button variant="outline" onClick={handleShareWhatsApp} className="h-14 border-green-200 hover:bg-green-50">
                <Icon name="MessageCircle" className="w-5 h-5 text-green-600 mr-2" />
                WhatsApp
              </Button>
              <Button variant="outline" onClick={() => { navigator.clipboard.writeText(`Vote em "${event.title}" - seus horários são 100% privados no Consenso: ${eventLink}`); addToast('Mensagem copiada!', 'success'); }} className="h-14 border-blue-200 hover:bg-blue-50">
                <Icon name="Copy" className="w-5 h-5 text-blue-600 mr-2" />
                Copiar Texto
              </Button>
            </div>

            <Card className="mb-8">
              <CardHeader><h3 className="font-semibold text-slate-900">Resumo da Reunião</h3></CardHeader>
              <CardContent className="space-y-3">
                <div className="flex justify-between"><span className="text-slate-500">Nome:</span><span className="font-medium">{event.title}</span></div>
                <div className="flex justify-between"><span className="text-slate-500">Período:</span><span className="font-medium">{formatDisplayDateFull(new Date(event.startDate))}</span></div>
                <div className="flex justify-between"><span className="text-slate-500">Até:</span><span className="font-medium">{formatDisplayDateFull(new Date(event.endDate))}</span></div>
                <div className="flex justify-between"><span className="text-slate-500">Quórum:</span><span className="font-medium">{event.quorum} participantes</span></div>
                <div className="flex justify-between"><span className="text-slate-500">Resultados:</span><span className="font-medium text-green-600">Só no fim</span></div>
              </CardContent>
            </Card>

            <Button onClick={onComplete} className="w-full h-14">
              {event.managerMode === 'participant' ? 'Ir para Votação' : 'Ir para Painel do Organizador'}
              <Icon name="ArrowRight" className="w-5 h-5 ml-2" />
            </Button>
          </main>
        </div>
      );
    };

    const VotingInterface = ({ eventId, userName, onSetUserName, onComplete, onViewResults, addToast }) => {
      const [eventData, setEventData] = useState(null);
      const [localUserName, setLocalUserName] = useState(userName);
      const [selectedSlots, setSelectedSlots] = useState(new Set());
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [hasVoted, setHasVoted] = useState(false);
      const [showNameInput, setShowNameInput] = useState(!userName);
      const [timezone, setTimezone] = useState('');
      const [isDragging, setIsDragging] = useState(false);
      const [dragValue, setDragValue] = useState(null);

      useEffect(() => {
        setTimezone(getTimezoneDisplay());
        const event = getEvent(eventId);
        if (event) {
          setEventData(event);
          const user = getCurrentUser();
          const voted = hasUserVoted(eventId, user.id);
          setHasVoted(voted);
          if (voted) {
            const existingVote = getUserVote(eventId, user.id);
            if (existingVote) setSelectedSlots(new Set(existingVote.timeSlots));
          }
        }
      }, [eventId]);

      const dates = eventData ? getDatesInRange(eventData.config.startDate, eventData.config.endDate) : [];

      const getTimeSlots = () => {
        if (!eventData) return [];
        switch (eventData.config.granularity) {
          case 'hour': return HOUR_SLOTS;
          case 'shift': return ['morning', 'afternoon', 'evening'];
          case 'day': return ['day'];
          default: return [];
        }
      };

      const getSlotKey = (date, time) => `${formatDate(date)}|${time}`;

      const handleMouseDown = (slotKey) => {
        if (hasVoted && !showNameInput) return;
        setIsDragging(true);
        const isSelected = selectedSlots.has(slotKey);
        setDragValue(!isSelected);
        const newSlots = new Set(selectedSlots);
        if (isSelected) newSlots.delete(slotKey); else newSlots.add(slotKey);
        setSelectedSlots(newSlots);
      };

      const handleMouseEnter = (slotKey) => {
        if (!isDragging || dragValue === null) return;
        const newSlots = new Set(selectedSlots);
        if (dragValue) newSlots.add(slotKey); else newSlots.delete(slotKey);
        setSelectedSlots(newSlots);
      };

      useEffect(() => {
        const handleGlobalMouseUp = () => { setIsDragging(false); setDragValue(null); };
        document.addEventListener('mouseup', handleGlobalMouseUp);
        return () => document.removeEventListener('mouseup', handleGlobalMouseUp);
      }, []);

      const handleSubmit = () => {
        if (!localUserName.trim()) { addToast('Por favor, informe seu nome', 'error'); return; }
        if (selectedSlots.size === 0) { addToast('Selecione pelo menos um horário', 'error'); return; }

        setIsSubmitting(true);
        try {
          const user = getCurrentUser();
          onSetUserName(localUserName);
          submitVote(eventId, { userId: user.id, userName: localUserName.trim(), timeSlots: Array.from(selectedSlots) });
          addToast(hasVoted ? 'Voto atualizado!' : 'Voto registrado!', 'success');
          setHasVoted(true);
          setShowNameInput(false);
          setEventData(getEvent(eventId));
          onComplete();
        } catch (error) { addToast('Erro ao registrar voto', 'error'); }
        finally { setIsSubmitting(false); }
      };

      if (!eventData) return <div className="min-h-screen flex items-center justify-center"><div className="spinner w-12 h-12"></div></div>;

      const timeSlots = getTimeSlots();
      const resultsAvailable = canViewResults(eventData, false);
      const progress = getVoteProgressPercentage(eventData);

      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-white border-b sticky top-0 z-10">
            <div className="max-w-7xl mx-auto px-4 py-4">
              <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                  <h1 className="text-xl font-bold">{eventData.config.title}</h1>
                  <div className="flex items-center gap-4 text-sm text-slate-500 mt-1">
                    <span className="flex items-center gap-1"><Icon name="Calendar" className="w-4 h-4" />{dates.length} dias</span>
                    <span className="flex items-center gap-1"><Icon name="Globe" className="w-4 h-4" />{timezone}</span>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <div className="text-right">
                    <div className="text-sm text-slate-500">Progresso</div>
                    <div className="font-semibold">{eventData.votes.length}/{eventData.config.quorum}</div>
                  </div>
                  <div className="w-32 h-2 bg-slate-200 rounded-full overflow-hidden">
                    <div className="h-full bg-blue-600 transition-all" style={{ width: `${Math.min(progress, 100)}%` }} />
                  </div>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-6">
            <div className="privacy-shield rounded-xl p-6 mb-6 text-white">
              <div className="flex items-start gap-4">
                <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center flex-shrink-0">
                  <Icon name="ShieldCheck" className="w-6 h-6 text-white" />
                </div>
                <div>
                  <h2 className="text-lg font-bold mb-2">Seus Horários São 100% Privados</h2>
                  <ul className="space-y-1 text-sm text-blue-100">
                    <li className="flex items-center gap-2"><Icon name="Check" className="w-4 h-4" />Ninguém verá quais horários você marcou</li>
                    <li className="flex items-center gap-2"><Icon name="Check" className="w-4 h-4" />Nem o organizador tem acesso aos seus votos</li>
                    <li className="flex items-center gap-2"><Icon name="Check" className="w-4 h-4" />Vote em TODOS os horários disponíveis</li>
                    <li className="flex items-center gap-2"><Icon name="Check" className="w-4 h-4" />Apenas o consenso final será revelado</li>
                  </ul>
                </div>
              </div>
            </div>

            {showNameInput && (
              <Card className="p-6 mb-6">
                <Label className="mb-2 block"><Icon name="User" className="w-4 h-4 inline mr-2" />Seu Nome</Label>
                <Input value={localUserName} onChange={(e) => setLocalUserName(e.target.value)} placeholder="Digite seu nome" />
              </Card>
            )}

            <Card className="mb-6 overflow-hidden">
              <CardHeader className="flex items-center justify-between bg-slate-50">
                <h2 className="font-semibold flex items-center gap-2"><Icon name="Clock" className="w-5 h-5" />Selecione seus horários disponíveis</h2>
                <span className="text-sm text-slate-500">{selectedSlots.size} selecionado{selectedSlots.size !== 1 ? 's' : ''}</span>
              </CardHeader>

              <div className="p-4 overflow-x-auto">
                <div className="min-w-max">
                  <div className="flex">
                    <div className="w-20 flex-shrink-0"></div>
                    {dates.map(date => (
                      <div key={date.toISOString()} className="w-24 flex-shrink-0 text-center py-2 border-b">
                        <div className="text-xs text-slate-500 uppercase">{getDayName(date)}</div>
                        <div className="text-lg font-semibold">{getDayNumber(date)}</div>
                        <div className="text-xs text-slate-400">{getMonthName(date)}</div>
                      </div>
                    ))}
                  </div>

                  {timeSlots.map(time => {
                    const isSeparator = SEPARATOR_HOURS.includes(time);
                    return (
                      <div key={time} className="flex">
                        <div className={`w-20 flex-shrink-0 py-3 pr-4 text-right text-sm font-medium flex items-center justify-end ${isSeparator ? 'border-b-4 border-red-400' : 'border-b'}`}>
                          {eventData.config.granularity === 'shift' ? SHIFT_TIMES[time] : time === 'day' ? 'Dia' : time}
                        </div>
                        {dates.map(date => {
                          const slotKey = getSlotKey(date, time);
                          const isSelected = selectedSlots.has(slotKey);
                          return (
                            <div key={slotKey} className={`w-24 flex-shrink-0 p-1 ${isSeparator ? 'border-b-4 border-red-400' : 'border-b'}`}>
                              <button onMouseDown={() => handleMouseDown(slotKey)} onMouseEnter={() => handleMouseEnter(slotKey)}
                                disabled={hasVoted && !showNameInput}
                                className={`w-full h-10 rounded-md transition-all ${isSelected ? 'bg-blue-600' : 'bg-slate-100 hover:bg-slate-200'} ${hasVoted && !showNameInput ? 'cursor-not-allowed opacity-70' : 'cursor-pointer'}`}>
                                {isSelected && <Icon name="Check" className="w-4 h-4 text-white mx-auto" />}
                              </button>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="p-4 bg-slate-50 border-t flex items-center gap-6 text-sm">
                <div className="flex items-center gap-2"><div className="w-6 h-6 bg-slate-100 rounded border"></div><span className="text-slate-600">Indisponível</span></div>
                <div className="flex items-center gap-2"><div className="w-6 h-6 bg-blue-600 rounded flex items-center justify-center"><Icon name="Check" className="w-3 h-3 text-white" /></div><span className="text-slate-600">Disponível</span></div>
                <div className="flex items-center gap-2 ml-auto"><div className="w-6 h-1 bg-red-400"></div><span className="text-slate-600">Divisão período</span></div>
              </div>
            </Card>

            <div className="flex flex-col sm:flex-row gap-4 justify-between">
              {hasVoted && !showNameInput ? (
                <>
                  <Button variant="outline" onClick={() => setShowNameInput(true)}>Editar Meu Voto</Button>
                  {resultsAvailable && <Button onClick={onViewResults}><Icon name="Eye" className="w-4 h-4 mr-2" />Ver Resultados</Button>}
                </>
              ) : (
                <>
                  <div className="text-sm text-slate-500">Dica: Clique e arraste para selecionar vários horários</div>
                  <Button onClick={handleSubmit} disabled={isSubmitting || selectedSlots.size === 0}>
                    {isSubmitting ? 'Enviando...' : hasVoted ? 'Atualizar Voto' : 'Confirmar Voto'}
                  </Button>
                </>
              )}
            </div>
          </main>
        </div>
      );
    };

    const ResultsScreen = ({ eventId, isManager, onBack, addToast }) => {
      const [eventData, setEventData] = useState(null);
      const [verdict, setVerdict] = useState(null);

      useEffect(() => {
        const event = getEvent(eventId);
        if (event) { setEventData(event); setVerdict(calculateConsensus(event)); }
      }, [eventId]);

      const handleExportICal = (slot) => {
        const slotKey = `${formatDate(slot.date)}|${slot.time}`;
        const event = parseTimeSlot(slotKey, eventData.config.title);
        if (event) { downloadICal(event); addToast('Arquivo .ics baixado!', 'success'); }
      };

      const handleExportGoogle = (slot) => {
        const slotKey = `${formatDate(slot.date)}|${slot.time}`;
        const event = parseTimeSlot(slotKey, eventData.config.title);
        if (event) openGoogleCalendar(event);
      };

      const formatSlotDisplay = (slot) => {
        const dateStr = formatDisplayDateFull(slot.date);
        if (slot.time === 'day') return dateStr;
        if (slot.time === 'morning') return `${dateStr} - Manhã`;
        if (slot.time === 'afternoon') return `${dateStr} - Tarde`;
        if (slot.time === 'evening') return `${dateStr} - Noite`;
        return `${dateStr} às ${slot.time}`;
      };

      if (!eventData || !verdict) return <div className="min-h-screen flex items-center justify-center"><div className="spinner w-12 h-12"></div></div>;

      const quorumReached = hasReachedQuorum(eventData);
      const progressPercent = getVoteProgressPercentage(eventData);

      if (!quorumReached && !eventData.config.resultsUnlocked) {
        return (
          <div className="min-h-screen bg-slate-50">
            <header className="bg-white border-b"><div className="max-w-3xl mx-auto px-4 h-16 flex items-center"><Button variant="ghost" size="sm" onClick={onBack}><Icon name="ArrowLeft" className="w-4 h-4 mr-2" />Voltar</Button></div></header>
            <main className="max-w-2xl mx-auto px-4 py-12 text-center">
              <div className="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="Lock" className="w-10 h-10 text-amber-600" /></div>
              <h1 className="text-2xl font-bold mb-2">Consenso em Andamento</h1>
              <p className="text-slate-600 mb-2">Os resultados serão revelados quando todos votarem.</p>
              <p className="text-sm text-slate-500 mb-6">Quórum necessário: <strong>{eventData.config.quorum} participantes</strong></p>
              
              <Card className="p-6 mb-6">
                <div className="flex justify-between mb-4"><span className="text-slate-600">Progresso</span><span className="font-semibold">{eventData.votes.length}/{eventData.config.quorum}</span></div>
                <div className="w-full h-4 bg-slate-200 rounded-full overflow-hidden"><div className="h-full bg-blue-600 transition-all" style={{ width: `${progressPercent}%` }} /></div>
                <p className="text-center text-sm text-slate-500 mt-2">{progressPercent}% completo</p>
              </Card>

              <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                <p className="text-sm text-blue-800">
                  <Icon name="Info" className="w-4 h-4 inline mr-1" />
                  Sua privacidade é mantida: ninguém pode ver os resultados parciais.
                </p>
              </div>
            </main>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-white border-b">
            <div className="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
              <Button variant="ghost" size="sm" onClick={onBack}><Icon name="ArrowLeft" className="w-4 h-4 mr-2" />Voltar</Button>
              <h1 className="text-lg font-semibold">Consenso Alcançado</h1>
              <div className="w-20"></div>
            </div>
          </header>

          <main className="max-w-3xl mx-auto px-4 py-8">
            <div className="text-center mb-8">
              <Logo className="w-16 h-16 mx-auto mb-4" />
              <h1 className="text-2xl font-bold mb-2">{eventData.config.title}</h1>
              <p className="text-slate-600">{formatDisplayDateFull(eventData.config.startDate)} - {formatDisplayDateFull(eventData.config.endDate)}</p>
            </div>

            <div className="flex justify-center mb-8">
              {verdict.type === 'unanimous' ? (
                <div className="inline-flex items-center gap-2 px-4 py-2 bg-green-100 text-green-700 rounded-full text-sm font-medium">
                  <Icon name="Trophy" className="w-4 h-4" />Consenso Unânime!
                </div>
              ) : verdict.type === 'majority' ? (
                <div className="inline-flex items-center gap-2 px-4 py-2 bg-blue-100 text-blue-700 rounded-full text-sm font-medium">
                  <Icon name="Users" className="w-4 h-4" />Maioria Alcançada
                </div>
              ) : (
                <div className="inline-flex items-center gap-2 px-4 py-2 bg-amber-100 text-amber-700 rounded-full text-sm font-medium">
                  <Icon name="Clock" className="w-4 h-4" />Aguardando votos
                </div>
              )}
            </div>

            {verdict.slots.length > 0 ? (
              <div className="space-y-4 mb-8">
                <h2 className="text-lg font-semibold text-center">
                  {verdict.type === 'unanimous' ? 'Horários com 100% de concordância:' : 'Melhor horário para o grupo:'}
                </h2>
                {verdict.slots.map((slot, index) => (
                  <Card key={index} className={index === 0 ? 'border-green-400 ring-2 ring-green-100' : ''}>
                    <CardHeader className="flex items-center justify-between">
                      <CardTitle className="text-lg flex items-center gap-2">
                        {index === 0 && <Icon name="Trophy" className="w-5 h-5 text-amber-500" />}
                        {formatSlotDisplay(slot)}
                      </CardTitle>
                      <div className="flex items-center gap-2 text-sm text-slate-500">
                        <Icon name="Users" className="w-4 h-4" />{slot.votes}/{verdict.totalVotes} votos
                      </div>
                    </CardHeader>
                    <CardContent>
                      <div className="flex gap-2">
                        <Button variant="outline" size="sm" onClick={() => handleExportGoogle(slot)} className="flex-1">
                          <Icon name="ExternalLink" className="w-4 h-4 mr-2" />Google Calendar
                        </Button>
                        <Button variant="outline" size="sm" onClick={() => handleExportICal(slot)} className="flex-1">
                          <Icon name="Download" className="w-4 h-4 mr-2" />Download .ics
                        </Button>
                      </div>
                    </CardContent>
                  </Card>
                ))}
              </div>
            ) : (
              <div className="text-center py-12 bg-white rounded-xl border mb-8">
                <Icon name="Clock" className="w-12 h-12 text-slate-300 mx-auto mb-4" />
                <h3 className="text-lg font-medium mb-2">Nenhum horário selecionado</h3>
                <p className="text-slate-600">Aguarde mais participantes votarem.</p>
              </div>
            )}

            <Card className="p-6">
              <h3 className="font-semibold mb-4">Estatísticas</h3>
              <div className="grid grid-cols-3 gap-4 text-center">
                <div><div className="text-2xl font-bold text-blue-600">{eventData.votes.length}</div><div className="text-sm text-slate-500">Votos</div></div>
                <div><div className="text-2xl font-bold">{eventData.config.quorum}</div><div className="text-sm text-slate-500">Quórum</div></div>
                <div><div className="text-2xl font-bold text-green-600">{progressPercent}%</div><div className="text-sm text-slate-500">Progresso</div></div>
              </div>
            </Card>

            <div className="mt-6 bg-green-50 border border-green-200 rounded-lg p-4">
              <p className="text-sm text-green-800 text-center">
                <Icon name="ShieldCheck" className="w-4 h-4 inline mr-1" />
                O consenso foi alcançado mantendo a privacidade de todos.
              </p>
            </div>
          </main>
        </div>
      );
    };

    const ManagerDashboard = ({ eventId, onViewResults, onBack, addToast }) => {
      const [eventData, setEventData] = useState(null);
      const [copied, setCopied] = useState(false);

      useEffect(() => { loadEventData(); }, [eventId]);

      const loadEventData = () => {
        const event = getEvent(eventId);
        if (event) setEventData(event);
      };

      const handleCopyLink = async () => {
        try { await navigator.clipboard.writeText(generateShortLink(eventId)); setCopied(true); addToast('Link copiado!', 'success'); setTimeout(() => setCopied(false), 2000); }
        catch { addToast('Erro ao copiar', 'error'); }
      };

      const handleCopyReminder = async () => {
        if (!eventData) return;
        const missingCount = getMissingVotesCount(eventData);
        const message = generateReminderMessage(eventData.config.title, missingCount, generateShortLink(eventId), eventData.config.quorum);
        try { await navigator.clipboard.writeText(message); addToast('Mensagem copiada!', 'success'); }
        catch { addToast('Erro ao copiar', 'error'); }
      };

      const handleUnlockResults = () => {
        unlockResults(eventId);
        loadEventData();
        addToast('Resultados desbloqueados!', 'success');
      };

      if (!eventData) return <div className="min-h-screen flex items-center justify-center"><div className="spinner w-12 h-12"></div></div>;

      const votedNames = getVotedUserNames(eventId);
      const missingCount = getMissingVotesCount(eventData);
      const progressPercent = getVoteProgressPercentage(eventData);
      const quorumReached = hasReachedQuorum(eventData);
      const earlyThresholdReached = hasReachedEarlyRevelationThreshold(eventData);
      const canUnlockEarly = earlyThresholdReached && !eventData.config.resultsUnlocked && !quorumReached;

      return (
        <div className="min-h-screen bg-slate-50">
          <header className="bg-white border-b">
            <div className="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
              <Button variant="ghost" size="sm" onClick={onBack}><Icon name="ArrowLeft" className="w-4 h-4 mr-2" />Sair</Button>
              <div className="flex items-center gap-3">
                <Logo className="w-6 h-6" />
                <h1 className="text-lg font-semibold">Painel do Organizador</h1>
              </div>
              <div className="w-20"></div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-4 py-8">
            <div className="text-center mb-8">
              <h1 className="text-2xl font-bold mb-2">{eventData.config.title}</h1>
              <p className="text-slate-600">{formatDisplayDateFull(eventData.config.startDate)} - {formatDisplayDateFull(eventData.config.endDate)}</p>
            </div>

            <Card className="mb-6 border-blue-200">
              <CardContent className="p-4 bg-blue-50">
                <div className="flex items-start gap-3">
                  <Icon name="EyeOff" className="w-5 h-5 text-blue-600 mt-0.5" />
                  <div className="text-sm text-blue-800">
                    <strong>Você não vê os horários marcados.</strong> Como organizador, você só acompanha 
                    quem votou e o progresso. Os horários individuais são secretos e só o consenso 
                    final será calculado quando o quórum for atingido.
                  </div>
                </div>
              </CardContent>
            </Card>

            <Card className="mb-6">
              <CardHeader><CardTitle className="flex items-center gap-2"><Icon name="TrendingUp" className="w-5 h-5 text-blue-600" />Progresso da Votação</CardTitle></CardHeader>
              <CardContent>
                <div className="flex items-center justify-between mb-4">
                  <div>
                    <div className="text-3xl font-bold">{eventData.votes.length} <span className="text-lg text-slate-500">/ {eventData.config.quorum}</span></div>
                    <div className="text-sm text-slate-500">votos recebidos</div>
                  </div>
                  <div className="text-right">
                    <div className="text-3xl font-bold text-blue-600">{progressPercent}%</div>
                    <div className="text-sm text-slate-500">do quórum</div>
                  </div>
                </div>
                <div className="w-full h-4 bg-slate-200 rounded-full overflow-hidden mb-4">
                  <div className={`h-full transition-all ${quorumReached ? 'bg-green-500' : 'bg-blue-600'}`} style={{ width: `${Math.min(progressPercent, 100)}%` }} />
                </div>
                {quorumReached ? (
                  <div className="flex items-center gap-2 text-green-600 bg-green-50 p-3 rounded-lg">
                    <Icon name="CheckCircle" className="w-5 h-5" /><span className="font-medium">Consenso alcançado! Resultados disponíveis.</span>
                  </div>
                ) : (
                  <div className="flex items-center gap-2 text-amber-600 bg-amber-50 p-3 rounded-lg">
                    <Icon name="Lock" className="w-5 h-5" /><span className="font-medium">Aguardando consenso do grupo</span>
                  </div>
                )}
              </CardContent>
            </Card>

            <div className="grid md:grid-cols-2 gap-6 mb-6">
              <Card>
                <CardHeader><CardTitle className="flex items-center gap-2 text-base"><Icon name="CheckCircle" className="w-4 h-4 text-green-600" />Já Votaram ({votedNames.length})</CardTitle></CardHeader>
                <CardContent>
                  {votedNames.length > 0 ? (
                    <ul className="space-y-2 max-h-48 overflow-y-auto">
                      {votedNames.map((name, i) => (
                        <li key={i} className="flex items-center gap-2 p-2 bg-slate-50 rounded-lg">
                          <div className="w-6 h-6 bg-blue-100 rounded-full flex items-center justify-center text-xs font-medium text-blue-600">{name.charAt(0).toUpperCase()}</div>
                          <span className="text-sm text-slate-700">{name}</span>
                        </li>
                      ))}
                    </ul>
                  ) : <p className="text-sm text-slate-500 text-center py-4">Ninguém votou ainda</p>}
                </CardContent>
              </Card>

              <Card>
                <CardHeader><CardTitle className="flex items-center gap-2 text-base"><Icon name="Settings" className="w-4 h-4 text-blue-600" />Ações</CardTitle></CardHeader>
                <CardContent className="space-y-3">
                  <Button variant="outline" onClick={handleCopyLink} className="w-full justify-between">
                    <span className="flex items-center gap-2"><Icon name={copied ? 'Check' : 'Copy'} className="w-4 h-4" />Copiar Link</span>
                  </Button>
                  {!quorumReached && (
                    <Button variant="outline" onClick={handleCopyReminder} className="w-full justify-between">
                      <span className="flex items-center gap-2"><Icon name="MessageCircle" className="w-4 h-4" />Copiar Lembrete</span>
                    </Button>
                  )}
                  {quorumReached && (
                    <Button onClick={onViewResults} className="w-full"><Icon name="Eye" className="w-4 h-4 mr-2" />Ver Consenso</Button>
                  )}
                </CardContent>
              </Card>
            </div>

            {canUnlockEarly && (
              <Card className="mb-6 border-amber-200 bg-amber-50">
                <CardContent className="p-6">
                  <div className="flex items-start gap-4">
                    <div className="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center flex-shrink-0">
                      <Icon name="Unlock" className="w-5 h-5 text-amber-600" />
                    </div>
                    <div className="flex-1">
                      <h3 className="font-semibold mb-1">Revelação Antecipada</h3>
                      <p className="text-sm text-slate-600 mb-4">{progressPercent}% do quórum votou. Você pode autorizar a visualização do consenso.</p>
                      <Button onClick={handleUnlockResults} variant="outline" className="bg-white">Autorizar Resultado Prévio</Button>
                    </div>
                  </div>
                </CardContent>
              </Card>
            )}

            {eventData.config.resultsUnlocked && (
              <div className="text-center">
                <div className="inline-flex items-center gap-2 px-4 py-2 bg-green-100 text-green-700 rounded-full text-sm">
                  <Icon name="Unlock" className="w-4 h-4" />
                  Consenso desbloqueado antecipadamente
                </div>
                <Button onClick={onViewResults} className="w-full mt-4"><Icon name="Eye" className="w-4 h-4 mr-2" />Ver Consenso</Button>
              </div>
            )}
          </main>
        </div>
      );
    };

    const App = () => {
      const [currentView, setCurrentView] = useState('home');
      const [currentEvent, setCurrentEvent] = useState(null);
      const [eventId, setEventId] = useState('');
      const [userName, setUserNameState] = useState('');
      const [isManager, setIsManager] = useState(false);
      const [toasts, setToasts] = useState([]);
      const [adminSession, setAdminSessionState] = useState(() => getAdminSession());
      const [pendingAfterLogin, setPendingAfterLogin] = useState(null);

      const addToast = (message, type = 'info') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
      };

      const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

      const goHome = () => {
        setCurrentView('home');
        window.location.hash = '';
      };

      const applyRouteFromHash = () => {
        const raw = window.location.hash.replace(/^#/, '');
        if (raw.startsWith('event/')) {
          const id = raw.slice(6);
          setEventId(id);
          setIsManager(false);
          setCurrentView('vote');
          return;
        }
        if (raw.startsWith('manage/')) {
          const id = raw.slice(7);
          setEventId(id);
          if (canManageEventId(id)) {
            setIsManager(true);
            setCurrentView('manage');
          } else if (getAdminSession()) {
            addToast('Esta reunião pertence a outra conta de organizador.', 'error');
            goHome();
          } else {
            setPendingAfterLogin({ view: 'manage', eventId: id });
            setCurrentView('admin-login');
          }
          return;
        }
      };

      useEffect(() => {
        const user = getCurrentUser();
        if (user.name) setUserNameState(user.name);
        applyRouteFromHash();
        const onHash = () => applyRouteFromHash();
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);

      const handleAdminLoginSuccess = () => {
        setAdminSessionState(getAdminSession());
        const p = pendingAfterLogin;
        setPendingAfterLogin(null);
        if (p?.view === 'create') setCurrentView('create');
        else if (p?.view === 'manage' && p.eventId) {
          if (canManageEventId(p.eventId)) {
            setEventId(p.eventId);
            setIsManager(true);
            setCurrentView('manage');
            window.location.hash = `manage/${p.eventId}`;
          } else {
            addToast('Sem permissão para este painel ou reunião inexistente.', 'error');
            goHome();
          }
        } else if (p?.view === 'events') setCurrentView('admin-events');
        else goHome();
      };

      const handleAdminLoginCancel = () => {
        setPendingAfterLogin(null);
        goHome();
      };

      const openCreateFlow = () => {
        if (!getAdminSession()) {
          setPendingAfterLogin({ view: 'create' });
          setCurrentView('admin-login');
          return;
        }
        window.location.hash = '';
        setCurrentView('create');
      };

      const openMyEvents = () => {
        if (!getAdminSession()) {
          setPendingAfterLogin({ view: 'events' });
          setCurrentView('admin-login');
          return;
        }
        setCurrentView('admin-events');
      };

      const handleCreateEvent = (config) => {
        setCurrentEvent(config);
        setEventId(config.id);
        setIsManager(true);
        setCurrentView('share');
        /* Hash só após a tela de compartilhar, para o listener #manage/ não trocar a view. */
      };

      const handleShareComplete = () => {
        if (currentEvent?.managerMode === 'participant') {
          setCurrentView('vote');
          window.location.hash = `event/${currentEvent.id}`;
        } else {
          setCurrentView('manage');
          window.location.hash = `manage/${currentEvent.id}`;
        }
      };

      const handleVoteComplete = () => setCurrentView('results');
      const handleViewResults = () => setCurrentView('results');
      const handleBackToManage = () => {
        setCurrentView('manage');
        if (eventId) window.location.hash = `manage/${eventId}`;
      };
      const handleBackFromResults = () => {
        if (isManager) handleBackToManage();
        else {
          setCurrentView('vote');
          if (eventId) window.location.hash = `event/${eventId}`;
        }
      };
      const handleSetUserName = (name) => { setUserNameState(name); setUserName(name); };

      const openEventFromDashboard = (id) => {
        setEventId(id);
        setIsManager(true);
        setCurrentView('manage');
        window.location.hash = `manage/${id}`;
      };

      const renderCurrentView = () => {
        switch (currentView) {
          case 'admin-login':
            return <AdminLoginScreen onSuccess={handleAdminLoginSuccess} onCancel={handleAdminLoginCancel} />;
          case 'admin-events':
            return (
              <AdminEventsScreen
                onOpenEvent={openEventFromDashboard}
                onBack={goHome}
                onCreate={openCreateFlow}
              />
            );
          case 'home':
            return (
              <HomeScreen
                adminSession={adminSession}
                onCreate={openCreateFlow}
                onMyEvents={openMyEvents}
                onOrganizerLogin={() => { setPendingAfterLogin({ view: 'events' }); setCurrentView('admin-login'); }}
                onLogout={() => { clearAdminSession(); setAdminSessionState(null); addToast('Sessão encerrada', 'info'); }}
              />
            );
          case 'create':
            return <EventCreation onCreate={handleCreateEvent} onCancel={goHome} addToast={addToast} />;
          case 'share':
            return currentEvent && <ShareScreen event={currentEvent} onComplete={handleShareComplete} onBack={() => { window.location.hash = ''; setCurrentView('create'); }} addToast={addToast} />;
          case 'vote':
            return <VotingInterface eventId={eventId} userName={userName} onSetUserName={handleSetUserName} onComplete={handleVoteComplete} onViewResults={handleViewResults} addToast={addToast} />;
          case 'results':
            return <ResultsScreen eventId={eventId} isManager={isManager} onBack={handleBackFromResults} addToast={addToast} />;
          case 'manage':
            return <ManagerDashboard eventId={eventId} onViewResults={handleViewResults} onBack={goHome} addToast={addToast} />;
          default:
            return (
              <HomeScreen
                adminSession={adminSession}
                onCreate={openCreateFlow}
                onMyEvents={openMyEvents}
                onOrganizerLogin={() => { setPendingAfterLogin({ view: 'events' }); setCurrentView('admin-login'); }}
                onLogout={() => { clearAdminSession(); setAdminSessionState(null); addToast('Sessão encerrada', 'info'); }}
              />
            );
        }
      };

      return (<><Toaster toasts={toasts} removeToast={removeToast} />{renderCurrentView()}</>);
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
