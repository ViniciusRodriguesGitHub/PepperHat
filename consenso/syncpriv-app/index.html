    /* PWA Install Prompt */
    .pwa-install-prompt {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);

      border-radius: 16px;

      z-index: 9999;
      max-width: 90vw;

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(100px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    
    .pwa-install-prompt.hide {

    /* Touch action for better mobile experience */

  <!-- PWA Registration Script -->
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('[PWA] Service Worker registered:', registration.scope);
          })
          .catch((error) => {
            console.log('[PWA] Service Worker registration failed:', error);
          });
      });
    }
    
    // PWA Install Prompt
    let deferredPrompt;
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    
    window.addEventListener('beforeinstallprompt', (e) => {
      console.log('[PWA] Install prompt available');
      e.preventDefault();
      deferredPrompt = e;
      showInstallPrompt();
    });
    
    function showInstallPrompt() {
      if (isStandalone) return;
      const dismissed = localStorage.getItem('pwa-prompt-dismissed');
      if (dismissed && Date.now() - parseInt(dismissed, 10) < 7 * 24 * 60 * 60 * 1000) return;
      
      const container = document.getElementById('pwa-prompt-container');
      if (!container) return;
      if (container.querySelector('.pwa-install-prompt')) return;
      
      // iOS uses a different install method
      if (isIOS) {
        showIOSInstallGuide();
        return;
      }
      
      const prompt = document.createElement('div');
      prompt.className = 'pwa-install-prompt';
      prompt.innerHTML = `
        <img src="icons/icon-72x72.png" alt="Consenso" class="w-12 h-12 rounded-xl">
        <div class="flex-1">
          <p class="font-semibold text-slate-900">Instalar Consenso</p>
          <p class="text-sm text-slate-500">Acesse rapidamente do seu dispositivo</p>
        </div>
        <button id="install-btn" type="button" class="px-4 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors">
          Instalar
        </button>
        <button id="dismiss-btn" type="button" aria-label="Fechar aviso de instalação" class="p-2 text-slate-400 hover:text-slate-600">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      `;
      
      container.appendChild(prompt);
      const installBtn = prompt.querySelector('#install-btn');
      const dismissBtn = prompt.querySelector('#dismiss-btn');
      
      installBtn?.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          console.log('[PWA] User choice:', outcome);
          deferredPrompt = null;
        }
        prompt.classList.add('hide');
        setTimeout(() => prompt.remove(), 300);
      });
      
      dismissBtn?.addEventListener('click', () => {
        prompt.classList.add('hide');
        setTimeout(() => prompt.remove(), 300);
        localStorage.setItem('pwa-prompt-dismissed', Date.now().toString());
      });
    }
    
    function showIOSInstallGuide() {
      const container = document.getElementById('ios-guide-container');
      if (!container || localStorage.getItem('ios-guide-shown')) return;
      
      const guide = document.createElement('div');
      guide.className = 'ios-install-guide';
      guide.innerHTML = `
        <div class="ios-install-content">
          <img src="icons/icon-152x152.png" alt="Consenso" class="w-20 h-20 mx-auto mb-4 rounded-2xl">
          <h2 class="text-xl font-bold text-slate-900 mb-2">Adicione à Tela Inicial</h2>
          <p class="text-slate-600 mb-6">Instale o Consenso para acesso rápido:</p>
          <div class="space-y-4 text-left bg-slate-50 p-4 rounded-xl mb-6">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">1</div>
              <span class="text-slate-700">Toque no botão <strong>Compartilhar</strong></span>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">2</div>
              <span class="text-slate-700">Role e toque em <strong>Adicionar à Tela de Início</strong></span>
            </div>
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">3</div>
              <span class="text-slate-700">Toque em <strong>Adicionar</strong></span>
            </div>
          </div>
          <button id="ios-close-btn" class="w-full py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition-colors">
            Entendi
          </button>
        </div>
      `;
      
      container.appendChild(guide);
      
      document.getElementById('ios-close-btn').addEventListener('click', () => {
        guide.remove();
        localStorage.setItem('ios-guide-shown', 'true');
      });
    }
    
    // Show prompt after 3 seconds if not dismissed recently
    setTimeout(() => {
      if (isStandalone) return;
      
      const dismissed = localStorage.getItem('pwa-prompt-dismissed');
      if (dismissed && Date.now() - parseInt(dismissed) < 7 * 24 * 60 * 60 * 1000) return;
      
      if (deferredPrompt || isIOS) {
        showInstallPrompt();
      }
    }, 3000);
    
    // Listen for app installed event
    window.addEventListener('appinstalled', () => {
      console.log('[PWA] App installed');
      deferredPrompt = null;
      const prompt = document.querySelector('.pwa-install-prompt');
      if (prompt) prompt.remove();
    });
  </script>
  
  <script type="text/babel">

    const Icon = ({ name, className = "w-5 h-5" }) => {

    };

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => { const timer = setTimeout(onClose, 3000); return () => clearTimeout(timer); }, [onClose]);
      const bgColors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500' };
      return (

          <Icon name={type === 'success' ? 'CheckCircle' : type === 'error' ? 'XCircle' : 'Info'} className="w-5 h-5" />
          {message}
        </div>
      );
    };

    const Toaster = ({ toasts, removeToast }) => (
      <>{toasts.map(t => <Toast key={t.id} message={t.message} type={t.type} onClose={() => removeToast(t.id)} />)}</>
    );

    const generateId = () => Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
    const formatDate = (date) => date.toISOString().split('T')[0];
    const formatDisplayDate = (date) => new Date(date).toLocaleDateString('pt-BR', { weekday: 'short', day: 'numeric', month: 'short' });
    const formatDisplayDateFull = (date) => new Date(date).toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
    
    const getDatesInRange = (start, end) => {
      const dates = [];
      let current = new Date(start);
      const endDate = new Date(end);
      while (current <= endDate) { dates.push(new Date(current)); current.setDate(current.getDate() + 1); }
      return dates;
    };
    
    const getDayName = (date) => date.toLocaleDateString('pt-BR', { weekday: 'short' });
    const getDayNumber = (date) => date.getDate();
    const getMonthName = (date) => date.toLocaleDateString('pt-BR', { month: 'short' });
    const getTimezoneDisplay = () => {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      const offset = new Date().getTimezoneOffset();
      const sign = offset <= 0 ? '+' : '-';
      const hours = Math.floor(Math.abs(offset) / 60);
      return `GMT${sign}${hours} ${tz.split('/').pop().replace(/_/g, ' ')}`;
    };

    const HOUR_SLOTS = ['06:00','07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];
    const SHIFT_TIMES = { morning: 'Manhã (6h-12h)', afternoon: 'Tarde (12h-18h)', evening: 'Noite (18h-22h)' };
    const SEPARATOR_HOURS = ['12:00', '18:00'];

    const STORAGE_KEY = 'consenso_events';
    const USER_KEY = 'consenso_user';
    const ADMIN_SESSION_KEY = 'consenso_admin_session';

    const getGoogleClientId = () => {
      try {
        const id = typeof window !== 'undefined' && window.CONSENSO_GOOGLE_CLIENT_ID;
        return id ? String(id).trim() : '';
      } catch { return ''; }
    };

    /** Carrega https://accounts.google.com/gsi/client uma vez; trata script já presente ou já carregado. */
    const loadGoogleIdentityScript = () => {
      if (typeof window === 'undefined') return Promise.reject(new Error('Sem window'));
      if (window.google?.accounts?.id) return Promise.resolve();
      return new Promise((resolve, reject) => {
        const sel = 'script[data-consenso-gis="1"]';
        const existing = document.querySelector(sel);
        const finish = () => {
          if (window.google?.accounts?.id) resolve();
          else reject(new Error('Google Identity Services indisponível após carregar o script.'));
        };
        if (existing) {
          if (window.google?.accounts?.id) return finish();
          existing.addEventListener('load', finish);
          existing.addEventListener('error', () => reject(new Error('Erro ao carregar o script do Google.')));
          queueMicrotask(() => {
            if (window.google?.accounts?.id) finish();
          });
          return;
        }
        const s = document.createElement('script');
        s.src = 'https://accounts.google.com/gsi/client';
        s.async = true;
        s.defer = true;
        s.setAttribute('data-consenso-gis', '1');
        s.onload = finish;
        s.onerror = () => reject(new Error('Erro ao carregar o script do Google.'));
        document.head.appendChild(s);
      });
    };

    const parseJwtPayload = (token) => {
      try {
        const part = token.split('.')[1];
        if (!part) return null;
        let base64 = part.replace(/-/g, '+').replace(/_/g, '/');
        const pad = base64.length % 4;
        if (pad) base64 += '='.repeat(4 - pad);
        const json = decodeURIComponent(atob(base64).split('').map((c) => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        return JSON.parse(json);
      } catch { return null; }
    };

    const getAdminSession = () => {
      try {
        const s = localStorage.getItem(ADMIN_SESSION_KEY);
        return s ? JSON.parse(s) : null;
      } catch { return null; }
    };

    const setAdminSession = (session) => {
      localStorage.setItem(ADMIN_SESSION_KEY, JSON.stringify(session));
    };

    const clearAdminSession = () => {
      localStorage.removeItem(ADMIN_SESSION_KEY);
    };

    const adminKey = (session) => {
      if (!session) return null;
      if (session.provider === 'google' && session.sub) return `google:${session.sub}`;
      if (session.provider === 'email' && session.email) return `email:${session.email.trim().toLowerCase()}`;
      return null;
    };

    const canManageEventId = (eventId) => {
      const event = getEvent(eventId);
      if (!event) return false;
      const session = getAdminSession();
      const key = adminKey(session);
      if (key && event.config.creatorAdminKey === key) return true;
      if (!event.config.creatorAdminKey) {
        const u = getCurrentUser();
        return event.config.creatorId === u.id;
      }
      return false;
    };

    const getEventsForAdmin = () => {
      const session = getAdminSession();
      const key = adminKey(session);
      if (!key) return [];
      const events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      return Object.keys(events)
        .filter((id) => events[id].config.creatorAdminKey === key)
        .map((id) => ({ id, ...events[id] }))
        .sort((a, b) => new Date(b.config.createdAt) - new Date(a.config.createdAt));
    };
    
    const getCurrentUser = () => {
      const stored = localStorage.getItem(USER_KEY);
      if (stored) return JSON.parse(stored);
      const newUser = { id: generateId(), name: '', isAnonymous: true };
      localStorage.setItem(USER_KEY, JSON.stringify(newUser));
      return newUser;
    };
    
    const setUserName = (name) => {
      const user = getCurrentUser();
      user.name = name;
      localStorage.setItem(USER_KEY, JSON.stringify(user));
    };

    /** Mesmo appId que o Kanban em index.html (Funil de vendas). */
    const CONSENSO_FB_APP_ID = 'pepperhatapps';

    const consensoFirestoreReady = () => !!(typeof window !== 'undefined' && window.consensoDb && window.consensoFsDoc);

    const consensoPublicDataDocRef = () =>
      window.consensoFsDoc(window.consensoDb, 'artifacts', CONSENSO_FB_APP_ID, 'public', 'data');

    const consensoLookupDocRef = (eventId) => window.consensoFsDoc(consensoPublicDataDocRef(), 'consenso_lookup', eventId);

    const consensoEventDocRef = (ownerUid, eventId) =>
      window.consensoFsDoc(window.consensoDb, 'artifacts', CONSENSO_FB_APP_ID, 'users', ownerUid, 'consenso_v1', eventId);

    const consensoVotesColRef = (ownerUid, eventId) =>
      window.consensoFsCollection(consensoEventDocRef(ownerUid, eventId), 'votes');

    const consensoConfigToPlain = (c) => ({
      ...c,
      startDate: c.startDate instanceof Date ? c.startDate.toISOString() : c.startDate,
      endDate: c.endDate instanceof Date ? c.endDate.toISOString() : c.endDate,
      createdAt: c.createdAt instanceof Date ? c.createdAt.toISOString() : c.createdAt,
    });

    const consensoFsScalarToIso = (v) => {
      if (v == null) return v;
      if (typeof v === 'string') return v;
      if (v instanceof Date) return v.toISOString();
      if (typeof v.toDate === 'function') return v.toDate().toISOString();
      if (typeof v.seconds === 'number') return new Date(v.seconds * 1000).toISOString();
      return String(v);
    };

    const consensoConfigFromFs = (c) => {
      if (!c || typeof c !== 'object') return c;
      return {
        ...c,
        startDate: consensoFsScalarToIso(c.startDate),
        endDate: consensoFsScalarToIso(c.endDate),
        createdAt: consensoFsScalarToIso(c.createdAt),
      };
    };

    const consensoCloudWriteNewEvent = async (ownerUid, newConfig) => {
      if (!consensoFirestoreReady() || !ownerUid) return;
      const eventId = newConfig.id;
      const batch = window.consensoFsWriteBatch(window.consensoDb);
      const cfg = consensoConfigToPlain({ ...newConfig, firebaseOwnerUid: ownerUid });
      batch.set(consensoLookupDocRef(eventId), { ownerUid, updatedAt: new Date().toISOString() });
      batch.set(consensoEventDocRef(ownerUid, eventId), {
        config: cfg,
        updatedAt: new Date().toISOString(),
      });
      await batch.commit();
    };

    const consensoCloudPushVote = async (ownerUid, eventId, vote) => {
      if (!consensoFirestoreReady() || !ownerUid) return;
      const vref = window.consensoFsDoc(
        window.consensoDb,
        'artifacts',
        CONSENSO_FB_APP_ID,
        'users',
        ownerUid,
        'consenso_v1',
        eventId,
        'votes',
        vote.userId
      );
      await window.consensoFsSetDoc(vref, {
        userId: vote.userId,
        userName: vote.userName,
        timeSlots: vote.timeSlots,
        votedAt: typeof vote.votedAt === 'string' ? vote.votedAt : new Date(vote.votedAt).toISOString(),
      });
      await window.consensoFsSetDoc(
        consensoEventDocRef(ownerUid, eventId),
        { updatedAt: new Date().toISOString() },
        { merge: true }
      );
    };

    const consensoCloudMergeConfig = async (ownerUid, eventId, partial) => {
      if (!consensoFirestoreReady() || !ownerUid) return;
      const ref = consensoEventDocRef(ownerUid, eventId);
      const snap = await window.consensoFsGetDoc(ref);
      if (!snap.exists()) return;
      const prev = consensoConfigFromFs(snap.data().config || {});
      const next = { ...prev, ...partial };
      await window.consensoFsSetDoc(ref, { config: consensoConfigToPlain(next), updatedAt: new Date().toISOString() }, { merge: true });
    };
    
    const createEvent = (config) => {
      const admin = getAdminSession();
      const ak = adminKey(admin);
      if (!ak) throw new Error('Organizador não autenticado');
      const events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const newConfig = {
        ...config,
        id: generateId(),
        createdAt: new Date().toISOString(),
        resultsUnlocked: false,
        creatorAdminKey: ak || undefined,
        creatorAdminEmail: admin?.email || undefined,
        ...(admin?.firebaseUid ? { firebaseOwnerUid: admin.firebaseUid } : {}),
      };
      events[newConfig.id] = { config: newConfig, votes: [] };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
      if (admin?.firebaseUid && consensoFirestoreReady()) {
        consensoCloudWriteNewEvent(admin.firebaseUid, newConfig).catch((e) => console.error('[Consenso] Firestore create', e));
      }
      return newConfig;
    };
    
    const getEvent = (eventId) => {
      const events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const event = events[eventId];
      if (!event) return null;
      return {
        config: { ...event.config, startDate: new Date(event.config.startDate), endDate: new Date(event.config.endDate), createdAt: new Date(event.config.createdAt) },
        votes: event.votes.map(v => ({ ...v, votedAt: new Date(v.votedAt) }))
      };
    };
    
    const submitVote = (eventId, vote) => {
      const events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const event = events[eventId];
      if (!event) throw new Error('Event not found');
      const votedAt = new Date().toISOString();
      event.votes = event.votes.filter(v => v.userId !== vote.userId);
      event.votes.push({ ...vote, votedAt });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
      const owner = event.config?.firebaseOwnerUid;
      if (owner && consensoFirestoreReady()) {
        consensoCloudPushVote(owner, eventId, { ...vote, votedAt }).catch((e) => console.error('[Consenso] Firestore vote', e));
      }
    };
    
    const hasUserVoted = (eventId, userId) => {
      const event = getEvent(eventId);
      return event ? event.votes.some(v => v.userId === userId) : false;
    };
    
    const getUserVote = (eventId, userId) => {
      const event = getEvent(eventId);
      return event ? event.votes.find(v => v.userId === userId) || null : null;
    };
    
    const unlockResults = (eventId) => {
      const events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (events[eventId]) {
        events[eventId].config.resultsUnlocked = true;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
        const owner = events[eventId].config?.firebaseOwnerUid;
        if (owner && consensoFirestoreReady()) {
          consensoCloudMergeConfig(owner, eventId, { resultsUnlocked: true }).catch((e) =>
            console.error('[Consenso] Firestore unlock', e)
          );
        }
      }
    };

    /** Exclui reunião: primeiro Firestore (se houver), depois localStorage — assim não apagamos o local se a nuvem falhar. */
    const deleteEventForOrganizer = async (eventId) => {
      if (!canManageEventId(eventId)) {
        throw new Error('Sem permissão para excluir esta reunião.');
      }
      const ev = getEvent(eventId);
      if (!ev) return;
      const ownerUid = ev?.config?.firebaseOwnerUid;
      const session = getAdminSession();

      if (ownerUid && session?.firebaseUid === ownerUid && consensoFirestoreReady() && window.consensoFsDeleteDoc) {
        try {
          const votesCol = consensoVotesColRef(ownerUid, eventId);
          const vs = await window.consensoFsGetDocs(votesCol);
          for (let i = 0; i < vs.docs.length; i++) {
            await window.consensoFsDeleteDoc(vs.docs[i].ref);
          }
          await window.consensoFsDeleteDoc(consensoEventDocRef(ownerUid, eventId));
          await window.consensoFsDeleteDoc(consensoLookupDocRef(eventId));
        } catch (e) {
          console.error('[Consenso] Firestore delete', e);
          throw new Error('Não foi possível excluir na nuvem. Verifique a conexão e tente de novo.');
        }
      }

      const events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      delete events[eventId];
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
    };
    
    const getVotedUserNames = (eventId) => {
      const event = getEvent(eventId);
      return event ? event.votes.map(v => v.userName).filter(Boolean) : [];
    };

    /** Serializa evento para JSON (datas em ISO) — usado no link do convite. */
    const eventSnapshotToJSON = (eventData) => {
      const { config, votes } = eventData;
      const c = { ...config };
      c.startDate = c.startDate instanceof Date ? c.startDate.toISOString() : c.startDate;
      c.endDate = c.endDate instanceof Date ? c.endDate.toISOString() : c.endDate;
      c.createdAt = c.createdAt instanceof Date ? c.createdAt.toISOString() : c.createdAt;
      return {
        config: c,
        votes: (votes || []).map((v) => ({
          ...v,
          votedAt: v.votedAt instanceof Date ? v.votedAt.toISOString() : v.votedAt,
        })),
      };
    };

    const isoVote = (d) => {
      if (!d) return new Date().toISOString();
      if (typeof d === 'string') return d;
      if (d instanceof Date) return d.toISOString();
      return new Date(d).toISOString();
    };

    /** Grava no localStorage o snapshot vindo do link (convidados em outro aparelho). Mescla votos por userId. */
    const mergeHydratedEvent = (eventId, payload) => {
      if (!payload?.config || String(payload.config.id) !== String(eventId)) return false;
      const events = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      const cfg = {
        ...payload.config,
        id: eventId,
        startDate: typeof payload.config.startDate === 'string' ? payload.config.startDate : isoVote(payload.config.startDate),
        endDate: typeof payload.config.endDate === 'string' ? payload.config.endDate : isoVote(payload.config.endDate),
        createdAt: typeof payload.config.createdAt === 'string' ? payload.config.createdAt : isoVote(payload.config.createdAt),
      };
      const incomingVotes = (payload.votes || []).map((v) => ({ ...v, votedAt: isoVote(v.votedAt) }));

      if (!events[eventId]) {
        events[eventId] = { config: cfg, votes: incomingVotes };
      } else {
        const byUser = new Map();
        [...(events[eventId].votes || []), ...incomingVotes].forEach((v) => {
          const prev = byUser.get(v.userId);
          if (!prev || new Date(v.votedAt) > new Date(prev.votedAt)) byUser.set(v.userId, v);
        });
        events[eventId] = {
          config: { ...events[eventId].config, ...cfg },
          votes: Array.from(byUser.values()),
        };
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
      return true;
    };

    const ensureConsensoGuestFirebase = async () => {
      if (!window.consensoSignInAnonymously) return;
      if (window.consensoFirebaseUser) return;
      try {
        await window.consensoSignInAnonymously();
      } catch (e) {
        console.error('[Consenso] signInAnonymously', e);
      }
    };

    const consensoFetchLookupOwnerUid = async (eventId) => {
      if (!consensoFirestoreReady()) return null;
      try {
        const snap = await window.consensoFsGetDoc(consensoLookupDocRef(eventId));
        if (!snap.exists()) return null;
        const o = snap.data()?.ownerUid;
        return o ? String(o) : null;
      } catch (e) {
        console.error('[Consenso] lookup', e);
        return null;
      }
    };

    const consensoSubscribeRemoteEvent = (ownerUid, eventId, onMerged) => {
      if (!consensoFirestoreReady()) return () => {};
      const evRef = consensoEventDocRef(ownerUid, eventId);
      const votesRef = consensoVotesColRef(ownerUid, eventId);
      let lastCfg = null;
      let lastVoteDocs = [];
      const flush = () => {
        if (!lastCfg) return;
        const votes = lastVoteDocs.map((d) => {
          const v = d.data();
          return {
            userId: v.userId,
            userName: v.userName,
            timeSlots: v.timeSlots || [],
            votedAt: isoVote(v.votedAt),
          };
        });
        const hadLocal = !!getEvent(eventId);
        mergeHydratedEvent(eventId, { config: consensoConfigFromFs(lastCfg), votes });
        if (onMerged) onMerged();
        if (!hadLocal && getEvent(eventId)) {
          window.dispatchEvent(new CustomEvent('consenso-remote-hydrated', { detail: { eventId } }));
        }
      };
      const u1 = window.consensoFsOnSnapshot(evRef, (snap) => {
        if (!snap.exists()) return;
        lastCfg = snap.data().config;
        flush();
      });
      const u2 = window.consensoFsOnSnapshot(votesRef, (snap) => {
        lastVoteDocs = snap.docs;
        flush();
      });
      return () => {
        u1();
        u2();
      };
    };

    const consensoSyncOrganizerEventsFromFirestore = async () => {
      const s = getAdminSession();
      const uid = s?.firebaseUid;
      if (!uid || !consensoFirestoreReady()) return;
      try {
        const col = window.consensoFsCollection(
          window.consensoFsDoc(window.consensoDb, 'artifacts', CONSENSO_FB_APP_ID, 'users', uid),
          'consenso_v1'
        );
        const snap = await window.consensoFsGetDocs(col);
        for (const d of snap.docs) {
          const eventId = d.id;
          const cfg = consensoConfigFromFs(d.data().config || {});
          const vcol = window.consensoFsCollection(d.ref, 'votes');
          const vs = await window.consensoFsGetDocs(vcol);
          const votes = vs.docs.map((x) => {
            const v = x.data();
            return { userId: v.userId, userName: v.userName, timeSlots: v.timeSlots || [], votedAt: isoVote(v.votedAt) };
          });
          mergeHydratedEvent(eventId, { config: cfg, votes });
        }
      } catch (e) {
        console.error('[Consenso] sync organizer', e);
      }
    };

    /** Convidado em reunião na nuvem usa o uid do Firebase (anônimo), para bater com as regras do Firestore. */
    const getConsensoVoterUser = (eventId) => {
      const local = getCurrentUser();
      const ev = getEvent(eventId);
      const fb = window.consensoFirebaseUser;
      if (ev?.config?.firebaseOwnerUid && fb?.uid) {
        return { id: fb.uid, name: local.name || '', isAnonymous: !!fb.isAnonymous };
      }
      return local;
    };

    /** Lê ?d= da hash #event/ID ou #manage/ID e repõe a reunião no storage. */
    const tryHydrateEventFromInviteHash = () => {
      if (typeof window === 'undefined' || typeof LZString === 'undefined') return;
      const raw = window.location.hash.replace(/^#/, '');
      const isEventRoute = raw.startsWith('event/');
      const isManageRoute = raw.startsWith('manage/');
      if (!isEventRoute && !isManageRoute) return;
      const qIdx = raw.indexOf('?');
      const path = qIdx >= 0 ? raw.slice(0, qIdx) : raw;
      const id = isEventRoute ? path.slice(6) : path.slice(7);
      if (!id) return;
      const params = new URLSearchParams(qIdx >= 0 ? raw.slice(qIdx + 1) : '');
      const d = params.get('d');
      if (!d) return;
      try {
        const json = LZString.decompressFromEncodedURIComponent(d);
        if (!json) return;
        const payload = JSON.parse(json);
        mergeHydratedEvent(id, payload);
      } catch (e) {
        console.error('[Consenso] Link de convite inválido:', e);
      }
    };

    /**
     * Link para convidados: com Firestore + login Google do organizador, link curto (#event/id).
     * Sem nuvem, mantém ?d= compactado (LZString) para outro aparelho.
     */
    const buildInviteLink = (eventId) => {
      const base = `${window.location.origin}${window.location.pathname}`;
      const ev = getEvent(eventId);
      if (ev?.config?.firebaseOwnerUid && consensoFirestoreReady()) {
        return `${base}#event/${eventId}`;
      }
      if (!ev || typeof LZString === 'undefined') return `${base}#event/${eventId}`;
      try {
        const snap = eventSnapshotToJSON(ev);
        const json = JSON.stringify(snap);
        const compressed = LZString.compressToEncodedURIComponent(json);
        if (!compressed) return `${base}#event/${eventId}`;
        return `${base}#event/${eventId}?d=${compressed}`;
      } catch (e) {
        console.error('[Consenso] buildInviteLink', e);
        return `${base}#event/${eventId}`;
      }
    };

    /** Mesma mensagem para WhatsApp e “Copiar texto”; URL sozinha na última linha (melhor para apps não cortarem o link). */
    const buildGuestInviteShareMessage = (eventTitle, eventLink) =>
      `Oi! 📅\n\nEstou organizando "${eventTitle}" no Consenso.\n\nSeus horários serão 100% privados — ninguém verá o que você marcou.\n\nVote aqui:\n${eventLink}`;

    /** Atualiza só a parte da hash após # com o link completo do convite (inclui ?d=). Adiciona ?voter se o organizador está votando. */
    const setVoteHashFromInviteLink = (eventId, isOrganizerVoting = false) => {
      const full = buildInviteLink(eventId);
      const i = full.indexOf('#');
      let hash = i >= 0 ? full.slice(i + 1) : `event/${eventId}`;
      if (isOrganizerVoting && !hash.includes('?')) {
        hash += '?voter';
      } else if (isOrganizerVoting && !hash.includes('voter')) {
        hash += '&voter';
      }
      window.location.hash = hash;
    };

    const calculateConsensus = (eventData) => {
      const { config, votes } = eventData;
      if (votes.length === 0) return { type: 'none', slots: [], totalVotes: 0, quorum: config.quorum };
      
      const slotMap = new Map();
      votes.forEach(vote => {
        vote.timeSlots.forEach(slotKey => {
          if (!slotMap.has(slotKey)) {
            const [dateStr, time] = slotKey.split('|');
            slotMap.set(slotKey, { date: new Date(dateStr), time, votes: 0, voterIds: [] });
          }
          const slot = slotMap.get(slotKey);
          slot.votes++;
          slot.voterIds.push(vote.userId);
        });
      });
      
      const slots = Array.from(slotMap.values());
      const unanimousSlots = slots.filter(s => s.votes === votes.length).sort((a, b) => a.date - b.date || a.time.localeCompare(b.time));
      
      if (unanimousSlots.length > 0) return { type: 'unanimous', slots: unanimousSlots.slice(0, 2), totalVotes: votes.length, quorum: config.quorum };
      
      const maxVotes = Math.max(...slots.map(s => s.votes));
      const majoritySlots = slots.filter(s => s.votes === maxVotes).sort((a, b) => a.date - b.date || a.time.localeCompare(b.time)).slice(0, 2);
      
      return { type: 'majority', slots: majoritySlots, totalVotes: votes.length, quorum: config.quorum };
    };
    
    const hasReachedQuorum = (eventData) => eventData.votes.length >= eventData.config.quorum;
    const hasReachedEarlyRevelationThreshold = (eventData) => eventData.config.earlyRevelation && eventData.votes.length >= Math.ceil(eventData.config.quorum * 0.5);
    const canViewResults = (eventData, isManager) => eventData.config.resultsUnlocked || hasReachedQuorum(eventData);
    const getMissingVotesCount = (eventData) => Math.max(0, eventData.config.quorum - eventData.votes.length);
    const getVoteProgressPercentage = (eventData) => Math.min(100, Math.round((eventData.votes.length / eventData.config.quorum) * 100));

    const generateICalContent = (event) => {
      const formatDate = (d) => d.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
      return `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Consenso//EN\nBEGIN:VEVENT\nUID:${Date.now()}@consenso.app\nDTSTAMP:${formatDate(new Date())}\nDTSTART:${formatDate(event.startDate)}\nDTEND:${formatDate(event.endDate)}\nSUMMARY:${event.title}\nDESCRIPTION:${event.description || 'Reunião via Consenso'}\nEND:VEVENT\nEND:VCALENDAR`;
    };
    
    const downloadICal = (event) => {
      const content = generateICalContent(event);
      const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `consenso-${event.title.toLowerCase().replace(/\s+/g, '-')}.ics`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    };
    
    const openGoogleCalendar = (event) => {
      const formatDate = (d) => d.toISOString().replace(/[-:]/g, '').split('.')[0];
      const params = new URLSearchParams({ action: 'TEMPLATE', text: event.title, dates: `${formatDate(event.startDate)}/${formatDate(event.endDate)}`, details: event.description || 'Reunião via Consenso' });
      window.open(`https://calendar.google.com/calendar/render?${params.toString()}`, '_blank');
    };
    
    const parseTimeSlot = (slotKey, title) => {
      const [dateStr, timeStr] = slotKey.split('|');
      const date = new Date(dateStr);
      
      if (timeStr === 'morning') {
        const start = new Date(date); start.setHours(6, 0, 0, 0);
        const end = new Date(date); end.setHours(12, 0, 0, 0);
        return { title, startDate: start, endDate: end };
      } else if (timeStr === 'afternoon') {
        const start = new Date(date); start.setHours(12, 0, 0, 0);
        const end = new Date(date); end.setHours(18, 0, 0, 0);
        return { title, startDate: start, endDate: end };
      } else if (timeStr === 'evening') {
        const start = new Date(date); start.setHours(18, 0, 0, 0);
        const end = new Date(date); end.setHours(22, 0, 0, 0);
        return { title, startDate: start, endDate: end };
      } else if (timeStr.includes(':')) {
        const [hours, minutes] = timeStr.split(':').map(Number);
        const start = new Date(date); start.setHours(hours, minutes, 0, 0);
        const end = new Date(date); end.setHours(hours + 1, minutes, 0, 0);
        return { title, startDate: start, endDate: end };
      }
      return null;
    };

    const generateReminderMessage = (eventTitle, missingCount, eventLink, totalQuorum) => {
      const votedCount = totalQuorum - missingCount;
      const progressPercent = Math.round((votedCount / totalQuorum) * 100);
      return `Oi! 👋\n\nFaltam apenas ${missingCount} pessoa${missingCount > 1 ? 's' : ''} para fecharmos o horário da reunião "${eventTitle}".\n\nProgresso: ${votedCount}/${totalQuorum} (${progressPercent}%)\n\nSeus horários são 100% privados no Consenso!\n\nVote aqui: ${eventLink}\n\nObrigado! 🗓️`;
    };

    const Button = ({ children, onClick, variant = 'primary', size = 'md', disabled, className = '', type = 'button' }) => {
      const baseStyles = 'inline-flex items-center justify-center font-medium rounded-lg transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2';
      const variants = {
        primary: 'bg-blue-600 hover:bg-blue-700 text-white disabled:bg-blue-300',
        outline: 'border-2 border-slate-300 hover:border-slate-400 text-slate-700 hover:bg-slate-50',
        ghost: 'text-slate-600 hover:text-slate-900 hover:bg-slate-100'
      };
      const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2', lg: 'px-6 py-3 text-lg' };
      
      return (
        <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyles} ${variants[variant]} ${sizes[size]} ${className}`}>
          {children}
        </button>
      );
    };

    const Input = ({ value, onChange, placeholder, type = 'text', className = '', min, max, id }) => (
      <input id={id} type={type} value={value} onChange={onChange} placeholder={placeholder} min={min} max={max} 
        className={`w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all ${className}`} />
    );

    const Label = ({ children, htmlFor, className = '' }) => (
      <label htmlFor={htmlFor} className={`block text-sm font-medium text-slate-700 mb-1 ${className}`}>{children}</label>
    );

    const Card = ({ children, className = '' }) => (
      <div className={`bg-white rounded-xl border border-slate-200 shadow-sm ${className}`}>{children}</div>
    );

    const CardHeader = ({ children, className = '' }) => (
      <div className={`p-4 border-b border-slate-200 ${className}`}>{children}</div>
    );

    const CardContent = ({ children, className = '' }) => (
      <div className={`p-4 ${className}`}>{children}</div>
    );

    const CardTitle = ({ children, className = '' }) => (
      <h3 className={`font-semibold text-slate-900 ${className}`}>{children}</h3>
    );

    const AdminLoginScreen = ({ onSuccess, onCancel }) => {
      const [email, setEmail] = useState('');
      const [gisError, setGisError] = useState('');
      const googleBtnRef = useRef(null);
      const onSuccessRef = useRef(onSuccess);
      const cancelledRef = useRef(false);
      useEffect(() => { onSuccessRef.current = onSuccess; }, [onSuccess]);

      const googleClientId = getGoogleClientId();

      useLayoutEffect(() => {
        cancelledRef.current = false;
        setGisError('');
        const cid = getGoogleClientId();
        if (!cid) return undefined;

        const mountButton = (allowRetry) => {
          const el = googleBtnRef.current;
          if (cancelledRef.current || !window.google?.accounts?.id) return;
          if (!el) {
            if (allowRetry !== false) setTimeout(() => mountButton(false), 0);
            return;
          }
          try {
            window.google.accounts.id.initialize({
              client_id: cid,
              ux_mode: 'popup',
              auto_select: false,
              callback: async (response) => {
                if (cancelledRef.current) return;
                if (!response?.credential) {
                  setGisError('Não foi possível obter o token do Google. Tente de novo.');
                  return;
                }
                const payload = parseJwtPayload(response.credential);
                if (!payload?.email || !payload?.sub) {
                  setGisError('Resposta do Google inválida. Verifique o Client ID e as origens autorizadas.');
                  return;
                }
                setGisError('');
                const baseSession = {
                  provider: 'google',
                  email: payload.email,
                  name: payload.name || '',
                  picture: payload.picture || '',
                  sub: payload.sub,
                };
                setAdminSession(baseSession);
                try {
                  if (window.linkConsensoFirebaseWithGoogleJwt) {
                    const cred = await window.linkConsensoFirebaseWithGoogleJwt(response.credential);
                    setAdminSession({ ...baseSession, firebaseUid: cred.user.uid });
                  }
                } catch (err) {
                  console.error('[Consenso] Firebase Auth (Google):', err);
                }
                if (!cancelledRef.current) onSuccessRef.current();
              }
            });
            el.innerHTML = '';
            const w = Math.min(320, typeof window !== 'undefined' ? Math.max(260, window.innerWidth - 48) : 320);
            window.google.accounts.id.renderButton(el, {
              type: 'standard',
              theme: 'outline',
              size: 'large',
              text: 'continue_with',
              width: w,
              locale: 'pt-BR'
            });
          } catch (err) {
            console.error('[Consenso] Google Sign-In:', err);
            setGisError(err?.message || 'Erro ao iniciar o login com Google.');
          }
        };

        const runAfterPaint = setTimeout(() => {
          loadGoogleIdentityScript()
            .then(() => {
              if (cancelledRef.current) return;
              mountButton(true);
            })
            .catch((err) => {
              console.error('[Consenso] GIS:', err);
              if (!cancelledRef.current) setGisError(err?.message || 'Falha ao carregar o Google.');
            });
        }, 0);

        return () => {
          cancelledRef.current = true;
          clearTimeout(runAfterPaint);
          if (googleBtnRef.current) googleBtnRef.current.innerHTML = '';
        };
      }, [googleClientId]);

      const handleEmailLogin = (e) => {
        e.preventDefault();
        const trimmed = email.trim().toLowerCase();
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimmed)) return;
        setAdminSession({ provider: 'email', email: trimmed, name: '' });
        onSuccess();

      return (

              <div className="flex items-center gap-3">

                <span className="text-xl font-bold text-slate-900">Consenso</span>
              </div>
              <Button variant="ghost" size="sm" onClick={onCancel}>
                <Icon name="ArrowLeft" className="w-4 h-4 mr-2" />
                Voltar
              </Button>
            </div>
          </header>
          <main className="flex-1 flex items-center justify-center px-4 py-10">
            <Card className="w-full max-w-md p-8">
              <h1 className="text-2xl font-bold text-slate-900 mb-1">Acesso do organizador</h1>
              <p className="text-sm text-slate-600 mb-6">
                Quem cria reuniões precisa identificar-se para listar eventos e gerir resultados. Com Google, a reunião pode sincronizar no Firestore (projeto pepperhatapps, como o Kanban). Quem recebe o link vota sem cadastro (login anônimo só no navegador).
              </p>

              {googleClientId ? (
                <div className="mb-6">
                  <p className="text-xs font-medium text-slate-500 uppercase tracking-wide mb-2">Continuar com Google</p>
                  {gisError && (
                    <p className="text-xs text-red-600 mb-2 p-2 bg-red-50 rounded border border-red-100">{gisError}</p>
                  )}
                  <div ref={googleBtnRef} className="flex justify-center min-h-[44px] w-full" />
                </div>
              ) : (
                <div className="mb-6 p-4 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-900">
                  <strong>Google:</strong> descomente e preencha <code className="text-xs bg-amber-100 px-1 rounded break-all">window.CONSENSO_GOOGLE_CLIENT_ID</code> no <code className="text-xs bg-amber-100 px-1 rounded">index.html</code> (trecho logo acima do <code className="text-xs bg-amber-100 px-1 rounded">&lt;div id="root"&gt;</code>) com o ID do cliente OAuth da Google Cloud Console.
                </div>
              )}

              <div className="relative my-6">
                <div className="absolute inset-0 flex items-center"><div className="w-full border-t border-slate-200" /></div>
                <div className="relative flex justify-center text-xs uppercase"><span className="bg-white px-2 text-slate-500">ou e-mail</span></div>
              </div>

              <form onSubmit={handleEmailLogin} className="space-y-4">

                <Button type="submit" className="w-full" disabled={!email.trim()}>

                O login por e-mail nesta versão é local ao navegador (sem senha por e-mail). Use Google para identificação mais forte.

          </main>

    const EventCreation = ({ onCreate, onCancel, addToast, topBar }) => {

      const [quorum, setQuorum] = useState(5);

      const [earlyRevelation, setEarlyRevelation] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);

      const handleQuorumSliderChange = (value) => { setQuorum(value[0]); setQuorumInput(value[0].toString()); };
      const handleQuorumInputChange = (e) => { const value = e.target.value; setQuorumInput(value); const num = parseInt(value, 10); if (!isNaN(num) && num > 0) setQuorum(num); };

      const handleSubmit = () => {
        if (!getAdminSession()) { addToast('Faça login como organizador para criar uma reunião', 'error'); return; }
        if (!title.trim()) { addToast('Por favor, informe o nome do evento', 'error'); return; }
        const start = new Date(startDate), end = new Date(endDate);
        if (start > end) { addToast('Data de início deve ser anterior à data de fim', 'error'); return; }
        if (quorum < 2) { addToast('Quórum mínimo de 2 participantes', 'error'); return; }
