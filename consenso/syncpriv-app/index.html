      const eventLink = buildInviteLink(event.id);

      const handleCopyLink = async () => {
        try { await navigator.clipboard.writeText(eventLink); setCopied(true); addToast('Link copiado!', 'success'); setTimeout(() => setCopied(false), 2000); }
        catch { addToast('Erro ao copiar link', 'error'); }
      };

      const handleShareWhatsApp = () => {
        const text = buildGuestInviteShareMessage(event.title, eventLink);
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
      };

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col">
          <ConsensoAppBar {...topBar} />

          <main className="max-w-2xl mx-auto px-4 py-8 flex-1 w-full">
            <Button variant="ghost" size="sm" onClick={onBack} className="mb-6 -ml-1">
              <Icon name="ArrowLeft" className="w-4 h-4 mr-2" />
              Ajustar detalhes da reunião
            </Button>
            <div className="text-center mb-8">
              <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <Icon name="Check" className="w-8 h-8 text-green-600" />
              </div>
              <h1 className="text-2xl font-bold text-slate-900 mb-2">Reunião Criada!</h1>
              <p className="text-slate-600">Compartilhe o link para encontrar o consenso</p>
            </div>

            <Card className="mb-6 border-green-200">
              <CardContent className="p-4 bg-green-50">
                <div className="flex items-start gap-3">
                  <Icon name="ShieldCheck" className="w-5 h-5 text-green-600 mt-0.5" />
                  <div className="text-sm text-green-800">
                    <strong>Garantia de Privacidade:</strong> Os participantes verão apenas que votaram, 
                    mas <strong>nunca</strong> quais horários foram marcados. Nem você como organizador terá acesso.
                  </div>
                </div>
              </CardContent>
            </Card>

            <Card className="mb-6">
              <div className="p-6">
                <Label className="mb-2 block">Link da Reunião</Label>
                <div className="flex gap-2">
                  <Input value={eventLink} readOnly className="bg-slate-50 font-mono text-sm break-all" />
                  <Button onClick={handleCopyLink} variant={copied ? 'primary' : 'outline'} className={copied ? 'bg-green-600' : ''}>
                    <Icon name={copied ? 'Check' : 'Copy'} className="w-5 h-5" />
                  </Button>
                </div>
                <p className="text-xs text-slate-500 mt-2">
                  {event.firebaseOwnerUid && consensoFirestoreReady()
                    ? 'Este link é curto: a reunião está na nuvem (mesmo projeto Firebase que o Kanban Funil). Convidados precisam de internet na primeira abertura.'
                    : 'Se a URL for longa, ela leva os dados da reunião no próprio link (modo só navegador). No WhatsApp, use Copiar link se vier cortado.'}
                </p>
              </div>
            </Card>

            <div className="grid grid-cols-2 gap-4 mb-8">
              <Button variant="outline" onClick={handleShareWhatsApp} className="h-14 border-green-200 hover:bg-green-50">
                <Icon name="MessageCircle" className="w-5 h-5 text-green-600 mr-2" />
                WhatsApp
              </Button>
              <Button variant="outline" onClick={() => { navigator.clipboard.writeText(buildGuestInviteShareMessage(event.title, eventLink)); addToast('Mensagem copiada!', 'success'); }} className="h-14 border-blue-200 hover:bg-blue-50">
                <Icon name="Copy" className="w-5 h-5 text-blue-600 mr-2" />
                Copiar Texto
              </Button>
            </div>

            <Card className="mb-8">
              <CardHeader><h3 className="font-semibold text-slate-900">Resumo da Reunião</h3></CardHeader>
              <CardContent className="space-y-3">
                <div className="flex justify-between"><span className="text-slate-500">Nome:</span><span className="font-medium">{event.title}</span></div>
                <div className="flex justify-between"><span className="text-slate-500">Período:</span><span className="font-medium">{formatDisplayDateFull(new Date(event.startDate))}</span></div>
                <div className="flex justify-between"><span className="text-slate-500">Até:</span><span className="font-medium">{formatDisplayDateFull(new Date(event.endDate))}</span></div>
                <div className="flex justify-between"><span className="text-slate-500">Quórum:</span><span className="font-medium">{event.quorum} participantes</span></div>
                <div className="flex justify-between"><span className="text-slate-500">Resultados:</span><span className="font-medium text-green-600">Só no fim</span></div>
              </CardContent>
            </Card>

            <Button onClick={onComplete} className="w-full h-14">
              {event.managerMode === 'participant' ? 'Ir para Votação' : 'Ir para Painel do Organizador'}
              <Icon name="ArrowRight" className="w-5 h-5 ml-2" />
            </Button>
          </main>
        </div>
      );
    };

    const VotingInterface = ({ eventId, userName, onSetUserName, onComplete, onViewResults, addToast, topBar }) => {
      const [eventData, setEventData] = useState(null);
      const [loadFailed, setLoadFailed] = useState(false);
      const [localUserName, setLocalUserName] = useState(userName);
      const [selectedSlots, setSelectedSlots] = useState(new Set());
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [hasVoted, setHasVoted] = useState(false);
      const [showNameInput, setShowNameInput] = useState(!userName);
      const [editingChoices, setEditingChoices] = useState(false);
      const editingChoicesRef = useRef(false);
      const [timezone, setTimezone] = useState('');
      const [isDragging, setIsDragging] = useState(false);
      const [dragValue, setDragValue] = useState(null);

      useEffect(() => {
        editingChoicesRef.current = editingChoices;
      }, [editingChoices]);

      useEffect(() => {
        let cancelled = false;
        let unsub = null;

        const applyLocalState = () => {
          const event = getEvent(eventId);
          if (!event) return false;
          setEventData(event);
          const voter = getConsensoVoterUser(eventId);
          const voted = hasUserVoted(eventId, voter.id);
          setHasVoted(voted);
          if (voted && !editingChoicesRef.current) {
            const existingVote = getUserVote(eventId, voter.id);
            if (existingVote) setSelectedSlots(new Set(existingVote.timeSlots));
          }
          return true;
        };

        const boot = async () => {
          setLoadFailed(false);
          setTimezone(getTimezoneDisplay());
          tryHydrateEventFromInviteHash();
          let ev = getEvent(eventId);
          if (!ev && consensoFirestoreReady()) {
            try {
              await ensureConsensoGuestFirebase();
            } catch (e) {
              console.error('[Consenso] auth convidado', e);
            }
            if (cancelled) return;
            const owner = await consensoFetchLookupOwnerUid(eventId);
            if (cancelled) return;
            if (owner) {
              unsub = consensoSubscribeRemoteEvent(owner, eventId, () => {
                if (cancelled) return;
                applyLocalState();
              });
              for (let i = 0; i < 50 && !getEvent(eventId); i++) await new Promise((r) => setTimeout(r, 80));
            }
            ev = getEvent(eventId);
          }
          if (cancelled) return;
          if (!ev) {
            setLoadFailed(true);
            return;
          }
          applyLocalState();
          if (ev.config?.firebaseOwnerUid) {
            const o = ev.config.firebaseOwnerUid;
            if (!unsub) {
              unsub = consensoSubscribeRemoteEvent(o, eventId, () => {
                if (cancelled) return;
                applyLocalState();
              });
            }
          }
        };

        boot();
        return () => {
          cancelled = true;
          if (unsub) unsub();
        };
      }, [eventId]);

      const dates = eventData ? getDatesInRange(eventData.config.startDate, eventData.config.endDate) : [];

      const getTimeSlots = () => {
        if (!eventData) return [];
        switch (eventData.config.granularity) {
          case 'hour': return HOUR_SLOTS;
          case 'shift': return ['morning', 'afternoon', 'evening'];
          case 'day': return ['day'];
          default: return [];
        }
      };

      const getSlotKey = (date, time) => `${formatDate(date)}|${time}`;

      const handleCancelEditChoices = () => {
        const voter = getConsensoVoterUser(eventId);
        const existing = getUserVote(eventId, voter.id);
        if (existing) setSelectedSlots(new Set(existing.timeSlots));
        setEditingChoices(false);
      };

      const handleMouseDown = (slotKey) => {
        if (hasVoted && !showNameInput && !editingChoices) return;
        setIsDragging(true);
        const isSelected = selectedSlots.has(slotKey);
        setDragValue(!isSelected);
        const newSlots = new Set(selectedSlots);
        if (isSelected) newSlots.delete(slotKey); else newSlots.add(slotKey);
        setSelectedSlots(newSlots);
      };

      const handleMouseEnter = (slotKey) => {
        if (!isDragging || dragValue === null) return;
        const newSlots = new Set(selectedSlots);
        if (dragValue) newSlots.add(slotKey); else newSlots.delete(slotKey);
        setSelectedSlots(newSlots);
      };

      useEffect(() => {
        const handleGlobalMouseUp = () => { setIsDragging(false); setDragValue(null); };
        document.addEventListener('mouseup', handleGlobalMouseUp);
        return () => document.removeEventListener('mouseup', handleGlobalMouseUp);
      }, []);

      const handleSubmit = async () => {
        if (!localUserName.trim()) { addToast('Por favor, informe seu nome', 'error'); return; }
        if (selectedSlots.size === 0) { addToast('Selecione pelo menos um horário', 'error'); return; }

        setIsSubmitting(true);
        try {
          const user = getConsensoVoterUser(eventId);
          onSetUserName(localUserName);
          submitVote(eventId, { userId: user.id, userName: localUserName.trim(), timeSlots: Array.from(selectedSlots) });
          addToast(hasVoted ? 'Voto atualizado!' : 'Voto registrado!', 'success');
          setHasVoted(true);
          setShowNameInput(false);
          setEditingChoices(false);
          setEventData(getEvent(eventId));
          const evCloud = getEvent(eventId);
          if (evCloud?.config?.firebaseOwnerUid && consensoFirestoreReady()) {
            addToast('Voto sincronizado na nuvem.', 'info');
          } else {
            setVoteHashFromInviteLink(eventId);
            try {
              await navigator.clipboard.writeText(window.location.href);
              addToast('Voto contabilizado neste link. Link atualizado copiado para compartilhar com o organizador.', 'info');
            } catch {
              addToast('Voto contabilizado neste link. Compartilhe a URL atual para sincronizar com o organizador.', 'info');
            }
          }
          onComplete();
        } catch (error) { addToast('Erro ao registrar voto', 'error'); }
        finally { setIsSubmitting(false); }
      };

      if (!eventData) {
        if (loadFailed) {
          return (
            <div className="min-h-screen flex flex-col bg-slate-50">
              {topBar && <ConsensoAppBar {...topBar} />}
              <div className="flex flex-col items-center justify-center p-6 flex-1">
                <div className="max-w-md text-center space-y-4">
                  <Icon name="AlertCircle" className="w-14 h-14 text-amber-500 mx-auto" />
                  <h1 className="text-xl font-bold text-slate-900">Não foi possível abrir esta reunião</h1>
                  <p className="text-slate-600 text-sm">
                    O link precisa dos dados da reunião (URL com <code className="text-xs bg-slate-100 px-1 rounded">?d=</code>) ou sincronização na nuvem ativa.
                    Peça ao organizador um link completo em <strong>Reunião criada</strong> ou <strong>Minhas reuniões</strong>.
                  </p>
                  <p className="text-xs text-slate-500">Sem internet, o modo só-navegador exige o link longo.</p>
                  <Button onClick={() => { window.location.hash = ''; window.location.reload(); }}>Ir ao início</Button>
                </div>
              </div>
            </div>
          );
        }
        return (
          <div className="min-h-screen flex flex-col bg-slate-50">
            {topBar && <ConsensoAppBar {...topBar} />}
            <div className="flex items-center justify-center flex-1">
              <div className="spinner w-12 h-12"></div>
            </div>
          </div>
        );
      }

      const timeSlots = getTimeSlots();
      const resultsAvailable = canViewResults(eventData, false);
      const progress = getVoteProgressPercentage(eventData);

      const slotsInteractive = !hasVoted || showNameInput || editingChoices;

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col">
          <ConsensoAppBar
            {...topBar}
            secondaryRow={
              <div className="max-w-7xl mx-auto px-4 py-3 w-full flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                <div className="min-w-0">
                  <h1 className="text-lg font-bold text-slate-900 truncate">{eventData.config.title}</h1>
                  <div className="flex flex-wrap items-center gap-x-4 gap-y-1 text-sm text-slate-500 mt-1">
                    <span className="flex items-center gap-1"><Icon name="Calendar" className="w-4 h-4" />{dates.length} dias</span>
                    <span className="flex items-center gap-1"><Icon name="Globe" className="w-4 h-4" />{timezone}</span>
                  </div>
                </div>
                <div className="flex items-center gap-4 shrink-0">
                  <div className="text-right">
                    <div className="text-xs text-slate-500">Progresso</div>
                    <div className="font-semibold text-sm">{eventData.votes.length}/{eventData.config.quorum}</div>
                  </div>
                  <div className="w-28 sm:w-32 h-2 bg-slate-200 rounded-full overflow-hidden">
                    <div className="h-full bg-blue-600 transition-all" style={{ width: `${Math.min(progress, 100)}%` }} />
                  </div>
                </div>
              </div>
            }
          />

          <main className="max-w-7xl mx-auto px-4 py-6 flex-1 w-full">
            <div className="privacy-shield rounded-xl p-6 mb-6 text-white">
              <div className="flex items-start gap-4">
                <div className="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center flex-shrink-0">
                  <Icon name="ShieldCheck" className="w-6 h-6 text-white" />
                </div>
                <div>
                  <h2 className="text-lg font-bold mb-2">Seus Horários São 100% Privados</h2>
                  <ul className="space-y-1 text-sm text-blue-100">
                    <li className="flex items-center gap-2"><Icon name="Check" className="w-4 h-4" />Ninguém verá quais horários você marcou</li>
                    <li className="flex items-center gap-2"><Icon name="Check" className="w-4 h-4" />Nem o organizador tem acesso aos seus votos</li>
                    <li className="flex items-center gap-2"><Icon name="Check" className="w-4 h-4" />Vote em TODOS os horários disponíveis</li>
                    <li className="flex items-center gap-2"><Icon name="Check" className="w-4 h-4" />Apenas o consenso final será revelado</li>
                  </ul>
                </div>
              </div>
            </div>

            {showNameInput && (
              <Card className="p-6 mb-6">
                <Label className="mb-2 block"><Icon name="User" className="w-4 h-4 inline mr-2" />Seu Nome</Label>
                <Input value={localUserName} onChange={(e) => setLocalUserName(e.target.value)} placeholder="Digite seu nome" />
              </Card>
            )}

            <Card className="mb-6 overflow-hidden">
              <CardHeader className="flex items-center justify-between bg-slate-50">
                <h2 className="font-semibold flex items-center gap-2"><Icon name="Clock" className="w-5 h-5" />Selecione seus horários disponíveis</h2>
                <span className="text-sm text-slate-500">{selectedSlots.size} selecionado{selectedSlots.size !== 1 ? 's' : ''}</span>
              </CardHeader>

              <div className="p-4 overflow-x-auto">
                <div className="min-w-max">
                  <div className="flex">
                    <div className="w-20 flex-shrink-0"></div>
                    {dates.map(date => (
                      <div key={date.toISOString()} className="w-24 flex-shrink-0 text-center py-2 border-b">
                        <div className="text-xs text-slate-500 uppercase">{getDayName(date)}</div>
                        <div className="text-lg font-semibold">{getDayNumber(date)}</div>
                        <div className="text-xs text-slate-400">{getMonthName(date)}</div>
                      </div>
                    ))}
                  </div>

                  {timeSlots.map(time => {
                    const isSeparator = SEPARATOR_HOURS.includes(time);
                    return (
                      <div key={time} className="flex">
                        <div className={`w-20 flex-shrink-0 py-3 pr-4 text-right text-sm font-medium flex items-center justify-end ${isSeparator ? 'border-b-4 border-red-400' : 'border-b'}`}>
                          {eventData.config.granularity === 'shift' ? SHIFT_TIMES[time] : time === 'day' ? 'Dia' : time}
                        </div>
                        {dates.map(date => {
                          const slotKey = getSlotKey(date, time);
                          const isSelected = selectedSlots.has(slotKey);
                          return (
                            <div key={slotKey} className={`w-24 flex-shrink-0 p-1 ${isSeparator ? 'border-b-4 border-red-400' : 'border-b'}`}>
                              <button onMouseDown={() => handleMouseDown(slotKey)} onMouseEnter={() => handleMouseEnter(slotKey)}
                                disabled={!slotsInteractive}
                                className={`w-full h-10 rounded-md transition-all ${isSelected ? 'bg-blue-600' : 'bg-slate-100 hover:bg-slate-200'} ${!slotsInteractive ? 'cursor-not-allowed opacity-70' : 'cursor-pointer'}`}>
                                {isSelected && <Icon name="Check" className="w-4 h-4 text-white mx-auto" />}
                              </button>
                            </div>
                          );
                        })}
                      </div>
                    );
                  })}
                </div>
              </div>

              <div className="p-4 bg-slate-50 border-t flex items-center gap-6 text-sm">
                <div className="flex items-center gap-2"><div className="w-6 h-6 bg-slate-100 rounded border"></div><span className="text-slate-600">Indisponível</span></div>
                <div className="flex items-center gap-2"><div className="w-6 h-6 bg-blue-600 rounded flex items-center justify-center"><Icon name="Check" className="w-3 h-3 text-white" /></div><span className="text-slate-600">Disponível</span></div>
                <div className="flex items-center gap-2 ml-auto"><div className="w-6 h-1 bg-red-400"></div><span className="text-slate-600">Divisão período</span></div>
              </div>
            </Card>

            <div className="flex flex-col sm:flex-row gap-4 justify-between items-stretch sm:items-center">
              {hasVoted && !showNameInput && !editingChoices ? (
                <div className="flex flex-col sm:flex-row gap-3 w-full sm:w-auto sm:ml-auto">
                  <Button variant="outline" onClick={() => setEditingChoices(true)} className="justify-center">
                    <Icon name="Pencil" className="w-4 h-4 mr-2" />Editar minhas escolhas
                  </Button>
                  {resultsAvailable && (
                    <Button onClick={onViewResults} className="justify-center">
                      <Icon name="Eye" className="w-4 h-4 mr-2" />Ver resultados
                    </Button>
                  )}
                </div>
              ) : (
                <>
                  <div className="text-sm text-slate-500">
                    {editingChoices ? 'Ajuste os horários e salve. Funciona com ou sem login de organizador.' : 'Dica: Clique e arraste para selecionar vários horários'}
                  </div>
                  <div className="flex flex-col sm:flex-row gap-2 sm:items-center">
                    {editingChoices && (
                      <Button variant="ghost" onClick={handleCancelEditChoices} className="order-2 sm:order-1">
                        Cancelar
                      </Button>
                    )}
                    <Button
                      onClick={handleSubmit}
                      disabled={isSubmitting || selectedSlots.size === 0}
                      className="order-1 sm:order-2"
                    >
                      {isSubmitting ? 'Enviando...' : hasVoted ? (editingChoices ? 'Salvar alterações' : 'Atualizar voto') : 'Confirmar voto'}
                    </Button>
                  </div>
                </>
              )}
            </div>
          </main>
        </div>
      );
    };

    const ResultsScreen = ({ eventId, isManager, onBack, addToast, topBar }) => {
      const [eventData, setEventData] = useState(null);
      const [verdict, setVerdict] = useState(null);

      useEffect(() => {
        tryHydrateEventFromInviteHash();
        const event = getEvent(eventId);
        if (event) { setEventData(event); setVerdict(calculateConsensus(event)); }
      }, [eventId]);

      const handleExportICal = (slot) => {
        const slotKey = `${formatDate(slot.date)}|${slot.time}`;
        const event = parseTimeSlot(slotKey, eventData.config.title);
        if (event) { downloadICal(event); addToast('Arquivo .ics baixado!', 'success'); }
      };

      const handleExportGoogle = (slot) => {
        const slotKey = `${formatDate(slot.date)}|${slot.time}`;
        const event = parseTimeSlot(slotKey, eventData.config.title);
        if (event) openGoogleCalendar(event);
      };

      const formatSlotDisplay = (slot) => {
        const dateStr = formatDisplayDateFull(slot.date);
        if (slot.time === 'day') return dateStr;
        if (slot.time === 'morning') return `${dateStr} - Manhã`;
        if (slot.time === 'afternoon') return `${dateStr} - Tarde`;
        if (slot.time === 'evening') return `${dateStr} - Noite`;
        return `${dateStr} às ${slot.time}`;
      };

      if (!eventData || !verdict) return <div className="min-h-screen flex items-center justify-center"><div className="spinner w-12 h-12"></div></div>;

      const quorumReached = hasReachedQuorum(eventData);
      const progressPercent = getVoteProgressPercentage(eventData);

      if (!quorumReached && !eventData.config.resultsUnlocked) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col">
            <ConsensoAppBar {...topBar} />
            <main className="max-w-2xl mx-auto px-4 py-12 text-center flex-1 w-full">
              <div className="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="Lock" className="w-10 h-10 text-amber-600" /></div>
              <h1 className="text-2xl font-bold mb-2">Consenso em Andamento</h1>
              <p className="text-slate-600 mb-2">Os resultados serão revelados quando todos votarem.</p>
              <p className="text-sm text-slate-500 mb-6">Quórum necessário: <strong>{eventData.config.quorum} participantes</strong></p>
              
              <Card className="p-6 mb-6">
                <div className="flex justify-between mb-4"><span className="text-slate-600">Progresso</span><span className="font-semibold">{eventData.votes.length}/{eventData.config.quorum}</span></div>
                <div className="w-full h-4 bg-slate-200 rounded-full overflow-hidden"><div className="h-full bg-blue-600 transition-all" style={{ width: `${progressPercent}%` }} /></div>
                <p className="text-center text-sm text-slate-500 mt-2">{progressPercent}% completo</p>
              </Card>

              <div className="bg-blue-50 border border-blue-200 rounded-lg p-4">
                <p className="text-sm text-blue-800">
                  <Icon name="Info" className="w-4 h-4 inline mr-1" />
                  Sua privacidade é mantida: ninguém pode ver os resultados parciais.
                </p>
              </div>
              <Button variant="outline" size="sm" onClick={onBack} className="mt-8">
                <Icon name="ArrowLeft" className="w-4 h-4 mr-2" />{isManager ? 'Voltar ao painel' : 'Voltar à votação'}
              </Button>
            </main>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col">
          <ConsensoAppBar
            {...topBar}
            secondaryRow={
              <div className="max-w-3xl mx-auto px-4 py-2 flex items-center justify-between">
                <h1 className="text-base font-semibold text-slate-800">Consenso alcançado</h1>
                <Button variant="ghost" size="sm" onClick={onBack}>
                  <Icon name="ArrowLeft" className="w-4 h-4 mr-2" />{isManager ? 'Painel' : 'Votação'}
                </Button>
              </div>
            }
          />

          <main className="max-w-3xl mx-auto px-4 py-8 flex-1 w-full">
            <div className="text-center mb-8">
              <Logo className="w-16 h-16 mx-auto mb-4" />
              <h1 className="text-2xl font-bold mb-2">{eventData.config.title}</h1>
              <p className="text-slate-600">{formatDisplayDateFull(eventData.config.startDate)} - {formatDisplayDateFull(eventData.config.endDate)}</p>
            </div>

            <div className="flex justify-center mb-8">
              {verdict.type === 'unanimous' ? (
                <div className="inline-flex items-center gap-2 px-4 py-2 bg-green-100 text-green-700 rounded-full text-sm font-medium">
                  <Icon name="Trophy" className="w-4 h-4" />Consenso Unânime!
                </div>
              ) : verdict.type === 'majority' ? (
                <div className="inline-flex items-center gap-2 px-4 py-2 bg-blue-100 text-blue-700 rounded-full text-sm font-medium">
                  <Icon name="Users" className="w-4 h-4" />Maioria Alcançada
                </div>
              ) : (
                <div className="inline-flex items-center gap-2 px-4 py-2 bg-amber-100 text-amber-700 rounded-full text-sm font-medium">
                  <Icon name="Clock" className="w-4 h-4" />Aguardando votos
                </div>
              )}
            </div>

            {verdict.slots.length > 0 ? (
              <div className="space-y-4 mb-8">
                <h2 className="text-lg font-semibold text-center">
                  {verdict.type === 'unanimous' ? 'Horários com 100% de concordância:' : 'Melhor horário para o grupo:'}
                </h2>
                {verdict.slots.map((slot, index) => (
                  <Card key={index} className={index === 0 ? 'border-green-400 ring-2 ring-green-100' : ''}>
                    <CardHeader className="flex items-center justify-between">
                      <CardTitle className="text-lg flex items-center gap-2">
                        {index === 0 && <Icon name="Trophy" className="w-5 h-5 text-amber-500" />}
                        {formatSlotDisplay(slot)}
                      </CardTitle>
                      <div className="flex items-center gap-2 text-sm text-slate-500">
                        <Icon name="Users" className="w-4 h-4" />{slot.votes}/{verdict.totalVotes} votos
                      </div>
                    </CardHeader>
                    <CardContent>
                      <div className="flex gap-2">
                        <Button variant="outline" size="sm" onClick={() => handleExportGoogle(slot)} className="flex-1">
                          <Icon name="ExternalLink" className="w-4 h-4 mr-2" />Google Calendar
                        </Button>
                        <Button variant="outline" size="sm" onClick={() => handleExportICal(slot)} className="flex-1">
                          <Icon name="Download" className="w-4 h-4 mr-2" />Download .ics
                        </Button>
                      </div>
                    </CardContent>
                  </Card>
                ))}
              </div>
            ) : (
              <div className="text-center py-12 bg-white rounded-xl border mb-8">
                <Icon name="Clock" className="w-12 h-12 text-slate-300 mx-auto mb-4" />
                <h3 className="text-lg font-medium mb-2">Nenhum horário selecionado</h3>
                <p className="text-slate-600">Aguarde mais participantes votarem.</p>
              </div>
            )}

            <Card className="p-6">
              <h3 className="font-semibold mb-4">Estatísticas</h3>
              <div className="grid grid-cols-3 gap-4 text-center">
                <div><div className="text-2xl font-bold text-blue-600">{eventData.votes.length}</div><div className="text-sm text-slate-500">Votos</div></div>
                <div><div className="text-2xl font-bold">{eventData.config.quorum}</div><div className="text-sm text-slate-500">Quórum</div></div>
                <div><div className="text-2xl font-bold text-green-600">{progressPercent}%</div><div className="text-sm text-slate-500">Progresso</div></div>
              </div>
            </Card>

            <div className="mt-6 bg-green-50 border border-green-200 rounded-lg p-4">
              <p className="text-sm text-green-800 text-center">
                <Icon name="ShieldCheck" className="w-4 h-4 inline mr-1" />
                O consenso foi alcançado mantendo a privacidade de todos.
              </p>
            </div>
          </main>
        </div>
      );
    };

    const ManagerDashboard = ({ eventId, onViewResults, onBack, onEditVote, addToast, topBar, onEventDeleted }) => {
      const [eventData, setEventData] = useState(null);
      const [copied, setCopied] = useState(false);

      useEffect(() => { loadEventData(); }, [eventId]);

      useEffect(() => {
        const refresh = () => {
          tryHydrateEventFromInviteHash();
          const ev = getEvent(eventId);
          if (ev) setEventData(ev);
        };
        const onStorage = (e) => {
          if (e.key === STORAGE_KEY || e.key === null) refresh();
        };
        const onVis = () => {
          if (document.visibilityState === 'visible') refresh();
        };
        window.addEventListener('storage', onStorage);
        document.addEventListener('visibilitychange', onVis);
        return () => {
          window.removeEventListener('storage', onStorage);
          document.removeEventListener('visibilitychange', onVis);
        };
      }, [eventId]);

      useEffect(() => {
        const ev = getEvent(eventId);
        const owner = ev?.config?.firebaseOwnerUid;
        if (!owner || !consensoFirestoreReady()) return undefined;
        const unsub = consensoSubscribeRemoteEvent(owner, eventId, () => {
          const next = getEvent(eventId);
          if (next) setEventData(next);
        });
        return unsub;
      }, [eventId]);

      const loadEventData = () => {
        const event = getEvent(eventId);
        if (event) setEventData(event);
      };

      const handleCopyLink = async () => {
        try { await navigator.clipboard.writeText(buildInviteLink(eventId)); setCopied(true); addToast('Link copiado!', 'success'); setTimeout(() => setCopied(false), 2000); }
        catch { addToast('Erro ao copiar', 'error'); }
      };

      const handleCopyReminder = async () => {
        if (!eventData) return;
        const missingCount = getMissingVotesCount(eventData);
        const message = generateReminderMessage(eventData.config.title, missingCount, buildInviteLink(eventId), eventData.config.quorum);
        try { await navigator.clipboard.writeText(message); addToast('Mensagem copiada!', 'success'); }
        catch { addToast('Erro ao copiar', 'error'); }
      };

      const handleUnlockResults = () => {
        unlockResults(eventId);
        loadEventData();
        addToast('Resultados desbloqueados!', 'success');
      };

      const handleDeleteEvent = async () => {
        if (!eventData) return;
        if (!window.confirm(`Excluir a reunião "${eventData.config.title}"? Os links deixarão de funcionar e os dados serão removidos (incluindo na nuvem, se aplicável).`)) return;
        try {
          await deleteEventForOrganizer(eventId);
          addToast('Reunião excluída.', 'success');
          onEventDeleted();
        } catch (e) {
          addToast(e?.message || 'Não foi possível excluir.', 'error');
        }
      };

      if (!eventData) return <div className="min-h-screen flex items-center justify-center"><div className="spinner w-12 h-12"></div></div>;

      const votedNames = getVotedUserNames(eventId);
      const missingCount = getMissingVotesCount(eventData);
      const progressPercent = getVoteProgressPercentage(eventData);
      const quorumReached = hasReachedQuorum(eventData);
      const earlyThresholdReached = hasReachedEarlyRevelationThreshold(eventData);
      const canUnlockEarly = earlyThresholdReached && !eventData.config.resultsUnlocked && !quorumReached;

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col">
          <ConsensoAppBar
            {...topBar}
            secondaryRow={
              <div className="max-w-4xl mx-auto px-4 py-2 flex flex-wrap items-center justify-between gap-2">
                <div className="flex items-center gap-2 min-w-0">
                  <Logo className="w-6 h-6 shrink-0" />
                  <span className="font-semibold text-slate-800 truncate">Painel do organizador</span>
                </div>
              </div>
            }
          />

          <main className="max-w-4xl mx-auto px-4 py-8 flex-1 w-full">
            <div className="text-center mb-8">
              <h1 className="text-2xl font-bold mb-2">{eventData.config.title}</h1>
              <p className="text-slate-600">{formatDisplayDateFull(eventData.config.startDate)} - {formatDisplayDateFull(eventData.config.endDate)}</p>
            </div>

            <Card className="mb-6 border-blue-200">
              <CardContent className="p-4 bg-blue-50">
                <div className="flex items-start gap-3">
                  <Icon name="EyeOff" className="w-5 h-5 text-blue-600 mt-0.5" />
                  <div className="text-sm text-blue-800">
                    <strong>Você não vê os horários marcados.</strong> Como organizador, você só acompanha 
                    quem votou e o progresso. Os horários individuais são secretos e só o consenso 
                    final será calculado quando o quórum for atingido.
                  </div>
                </div>
              </CardContent>
            </Card>

            <Card className="mb-6">
              <CardHeader><CardTitle className="flex items-center gap-2"><Icon name="TrendingUp" className="w-5 h-5 text-blue-600" />Progresso da Votação</CardTitle></CardHeader>
              <CardContent>
                <div className="flex items-center justify-between mb-4">
                  <div>
                    <div className="text-3xl font-bold">{eventData.votes.length} <span className="text-lg text-slate-500">/ {eventData.config.quorum}</span></div>
                    <div className="text-sm text-slate-500">votos recebidos</div>
                  </div>
                  <div className="text-right">
                    <div className="text-3xl font-bold text-blue-600">{progressPercent}%</div>
                    <div className="text-sm text-slate-500">do quórum</div>
                  </div>
                </div>
                <div className="w-full h-4 bg-slate-200 rounded-full overflow-hidden mb-4">
                  <div className={`h-full transition-all ${quorumReached ? 'bg-green-500' : 'bg-blue-600'}`} style={{ width: `${Math.min(progressPercent, 100)}%` }} />
                </div>
                {quorumReached ? (
                  <div className="flex items-center gap-2 text-green-600 bg-green-50 p-3 rounded-lg">
                    <Icon name="CheckCircle" className="w-5 h-5" /><span className="font-medium">Consenso alcançado! Resultados disponíveis.</span>
                  </div>
                ) : (
                  <div className="flex items-center gap-2 text-amber-600 bg-amber-50 p-3 rounded-lg">
                    <Icon name="Lock" className="w-5 h-5" /><span className="font-medium">Aguardando consenso do grupo</span>
                  </div>
                )}
              </CardContent>
            </Card>

            <div className="grid md:grid-cols-2 gap-6 mb-6">
              <Card>
                <CardHeader><CardTitle className="flex items-center gap-2 text-base"><Icon name="CheckCircle" className="w-4 h-4 text-green-600" />Já Votaram ({votedNames.length})</CardTitle></CardHeader>
                <CardContent>
                  {votedNames.length > 0 ? (
                    <ul className="space-y-2 max-h-48 overflow-y-auto">
                      {votedNames.map((name, i) => (
                        <li key={i} className="flex items-center gap-2 p-2 bg-slate-50 rounded-lg">
                          <div className="w-6 h-6 bg-blue-100 rounded-full flex items-center justify-center text-xs font-medium text-blue-600">{name.charAt(0).toUpperCase()}</div>
                          <span className="text-sm text-slate-700">{name}</span>
                        </li>
                      ))}
                    </ul>
                  ) : <p className="text-sm text-slate-500 text-center py-4">Ninguém votou ainda</p>}
                </CardContent>
              </Card>

              <Card>
                <CardHeader><CardTitle className="flex items-center gap-2 text-base"><Icon name="Settings" className="w-4 h-4 text-blue-600" />Ações</CardTitle></CardHeader>
                <CardContent className="space-y-3">
                  <Button variant="outline" onClick={handleCopyLink} className="w-full justify-between">
                    <span className="flex items-center gap-2"><Icon name={copied ? 'Check' : 'Copy'} className="w-4 h-4" />Copiar Link</span>
                  </Button>
                  <Button variant="outline" onClick={onEditVote} className="w-full justify-between">
                    <span className="flex items-center gap-2"><Icon name="Pencil" className="w-4 h-4" />Editar meu voto</span>
                  </Button>
                  {!quorumReached && (
                    <Button variant="outline" onClick={handleCopyReminder} className="w-full justify-between">
                      <span className="flex items-center gap-2"><Icon name="MessageCircle" className="w-4 h-4" />Copiar Lembrete</span>
                    </Button>
                  )}
                  {quorumReached && (
                    <Button onClick={onViewResults} className="w-full"><Icon name="Eye" className="w-4 h-4 mr-2" />Ver Consenso</Button>
                  )}
                </CardContent>
              </Card>
            </div>

            <Card className="mb-6 border-red-200 bg-red-50/40">
              <CardHeader><CardTitle className="flex items-center gap-2 text-base text-red-900"><Icon name="Trash2" className="w-4 h-4" />Excluir reunião</CardTitle></CardHeader>
              <CardContent className="space-y-3">
                <p className="text-sm text-slate-600">Remove esta votação do armazenamento e da nuvem (Firebase). Participantes não conseguirão mais abrir o link.</p>
                <Button variant="outline" className="border-red-300 text-red-700 hover:bg-red-100" onClick={handleDeleteEvent}>
                  <Icon name="Trash2" className="w-4 h-4 mr-2" />Excluir permanentemente
                </Button>
              </CardContent>
            </Card>

            {canUnlockEarly && (
              <Card className="mb-6 border-amber-200 bg-amber-50">
                <CardContent className="p-6">
                  <div className="flex items-start gap-4">
                    <div className="w-10 h-10 bg-amber-100 rounded-full flex items-center justify-center flex-shrink-0">
                      <Icon name="Unlock" className="w-5 h-5 text-amber-600" />
                    </div>
                    <div className="flex-1">
                      <h3 className="font-semibold mb-1">Revelação Antecipada</h3>
                      <p className="text-sm text-slate-600 mb-4">{progressPercent}% do quórum votou. Você pode autorizar a visualização do consenso.</p>
                      <Button onClick={handleUnlockResults} variant="outline" className="bg-white">Autorizar Resultado Prévio</Button>
                    </div>
                  </div>
                </CardContent>
              </Card>
            )}

            {eventData.config.resultsUnlocked && (
              <div className="text-center">
                <div className="inline-flex items-center gap-2 px-4 py-2 bg-green-100 text-green-700 rounded-full text-sm">
                  <Icon name="Unlock" className="w-4 h-4" />
                  Consenso desbloqueado antecipadamente
                </div>
                <Button onClick={onViewResults} className="w-full mt-4"><Icon name="Eye" className="w-4 h-4 mr-2" />Ver Consenso</Button>
              </div>
            )}
          </main>
        </div>
      );
    };

    const App = () => {
      const [currentView, setCurrentView] = useState('home');
      const [currentEvent, setCurrentEvent] = useState(null);
      const [eventId, setEventId] = useState('');
      const [userName, setUserNameState] = useState('');
      const [isManager, setIsManager] = useState(false);
      const [toasts, setToasts] = useState([]);
      const [adminSession, setAdminSessionState] = useState(() => getAdminSession());
      const [pendingAfterLogin, setPendingAfterLogin] = useState(null);
      const [routeNonce, setRouteNonce] = useState(0);

      const addToast = (message, type = 'info') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, type }]);
      };

      const removeToast = (id) => setToasts(prev => prev.filter(t => t.id !== id));

      const goHome = () => {
        setCurrentView('home');
        window.location.hash = '';
      };

      const applyRouteFromHash = () => {
        tryHydrateEventFromInviteHash();
        const raw = window.location.hash.replace(/^#/, '');
        if (raw.startsWith('event/')) {
          const id = raw.slice(6).split('?')[0].split('/')[0];
          const queryString = raw.includes('?') ? raw.slice(raw.indexOf('?')) : '';
          const isVoterMode = queryString.includes('voter');
          setEventId(id);
          /* Se tem ?voter, o organizador quer votar. Caso contrário, redirecionar para painel. */
          if (canManageEventId(id) && !isVoterMode) {
            setIsManager(true);
            setCurrentView('manage');
            const pathOnly = raw.split('?')[0];
            if (pathOnly === `event/${id}`) window.location.hash = `manage/${id}`;
            return;
          }
          setIsManager(false);
          setCurrentView('vote');
          return;
        }
        if (raw.startsWith('manage/')) {
          const id = raw.slice(7).split('?')[0];
          setEventId(id);
          if (canManageEventId(id)) {
            setIsManager(true);
            setCurrentView('manage');
          } else if (getAdminSession()) {
            addToast('Esta reunião pertence a outra conta de organizador.', 'error');
            goHome();
          } else {
            setPendingAfterLogin({ view: 'manage', eventId: id });
            setCurrentView('admin-login');
          }
          return;
        }
      };

      useEffect(() => {
        const user = getCurrentUser();
        if (user.name) setUserNameState(user.name);
        applyRouteFromHash();
        const onHash = () => applyRouteFromHash();
        window.addEventListener('hashchange', onHash);
        const onRemote = () => setRouteNonce((n) => n + 1);
        window.addEventListener('consenso-remote-hydrated', onRemote);
        return () => {
          window.removeEventListener('hashchange', onHash);
          window.removeEventListener('consenso-remote-hydrated', onRemote);
        };
      }, []);

      useEffect(() => {
        if (routeNonce === 0) return;
        applyRouteFromHash();
      }, [routeNonce]);

      const handleAdminLoginSuccess = () => {
        setAdminSessionState(getAdminSession());
        const p = pendingAfterLogin;
        setPendingAfterLogin(null);
        if (p?.view === 'create') setCurrentView('create');
        else if (p?.view === 'manage' && p.eventId) {
          if (canManageEventId(p.eventId)) {
            setEventId(p.eventId);
            setIsManager(true);
            setCurrentView('manage');
            window.location.hash = `manage/${p.eventId}`;
          } else {
            addToast('Sem permissão para este painel ou reunião inexistente.', 'error');
            goHome();
          }
        } else if (p?.view === 'events') setCurrentView('admin-events');
        else goHome();
      };

      const handleAdminLoginCancel = () => {
        setPendingAfterLogin(null);
        goHome();
      };

      const openCreateFlow = () => {
        if (!getAdminSession()) {
          setPendingAfterLogin({ view: 'create' });
          setCurrentView('admin-login');
          return;
        }
        window.location.hash = '';
        setCurrentView('create');
      };

      const openMyEvents = () => {
        if (!getAdminSession()) {
          setPendingAfterLogin({ view: 'events' });
          setCurrentView('admin-login');
          return;
        }
        setCurrentView('admin-events');
      };

      const handleCreateEvent = (config) => {
        setCurrentEvent(config);
        setEventId(config.id);
        setIsManager(true);
        setCurrentView('share');
        /* Hash só após a tela de compartilhar, para o listener #manage/ não trocar a view. */
      };

      const handleShareComplete = () => {
        if (currentEvent?.managerMode === 'participant') {
          setCurrentView('vote');
          setVoteHashFromInviteLink(currentEvent.id);
        } else {
          setCurrentView('manage');
          window.location.hash = `manage/${currentEvent.id}`;
        }
      };

      const handleVoteComplete = () => setCurrentView('results');
      const handleViewResults = () => setCurrentView('results');
      const handleBackToManage = () => {
        setCurrentView('manage');
        if (eventId) window.location.hash = `manage/${eventId}`;
      };
      const handleBackFromResults = () => {
        if (isManager) handleBackToManage();
        else {
          setCurrentView('vote');
          if (eventId) setVoteHashFromInviteLink(eventId);
        }
      };
      const handleSetUserName = (name) => { setUserNameState(name); setUserName(name); };

      const openEventFromDashboard = (id) => {
        setEventId(id);
        setIsManager(true);
        setCurrentView('manage');
        window.location.hash = `manage/${id}`;
      };

      const openOrganizerLogin = () => {
        setPendingAfterLogin({ view: 'events' });
        setCurrentView('admin-login');
      };

      const handleOrganizerLogout = () => {
        clearAdminSession();
        setAdminSessionState(null);
        addToast('Sessão encerrada', 'info');
      };

      const topBarNavigation = {
        adminSession,
        onGoHome: goHome,
        onMyEvents: openMyEvents,
        onOrganizerLogin: openOrganizerLogin,
        onLogout: handleOrganizerLogout,
      };

      const renderCurrentView = () => {
        switch (currentView) {
          case 'admin-login':
            return <AdminLoginScreen onSuccess={handleAdminLoginSuccess} onCancel={handleAdminLoginCancel} />;
          case 'admin-events':
            return (
              <AdminEventsScreen
                onOpenEvent={openEventFromDashboard}
                onCreate={openCreateFlow}
                topBar={topBarNavigation}
                addToast={addToast}
              />
            );
          case 'home':
            return (
              <HomeScreen
                adminSession={adminSession}
                onCreate={openCreateFlow}
                onMyEvents={openMyEvents}
                onOrganizerLogin={openOrganizerLogin}
                onLogout={handleOrganizerLogout}
                onGoHome={goHome}
              />
            );
          case 'create':
            return <EventCreation onCreate={handleCreateEvent} onCancel={goHome} addToast={addToast} topBar={topBarNavigation} />;
          case 'share':
            return currentEvent && <ShareScreen event={currentEvent} onComplete={handleShareComplete} onBack={() => { window.location.hash = ''; setCurrentView('create'); }} addToast={addToast} topBar={topBarNavigation} />;
          case 'vote':
            return <VotingInterface eventId={eventId} userName={userName} onSetUserName={handleSetUserName} onComplete={handleVoteComplete} onViewResults={handleViewResults} addToast={addToast} topBar={topBarNavigation} />;
          case 'results':
            return <ResultsScreen eventId={eventId} isManager={isManager} onBack={handleBackFromResults} addToast={addToast} topBar={topBarNavigation} />;
          case 'manage':
            return (
              <ManagerDashboard
                eventId={eventId}
                onViewResults={handleViewResults}
                onBack={goHome}
                onEditVote={() => { setCurrentView('vote'); if (eventId) setVoteHashFromInviteLink(eventId, true); }}
                addToast={addToast}
                topBar={topBarNavigation}
                onEventDeleted={goHome}
              />
            );
          default:
            return (
              <HomeScreen
                adminSession={adminSession}
                onCreate={openCreateFlow}
                onMyEvents={openMyEvents}
                onOrganizerLogin={openOrganizerLogin}
                onLogout={handleOrganizerLogout}
                onGoHome={goHome}
              />
            );
        }
      };

      return (<><Toaster toasts={toasts} removeToast={removeToast} />{renderCurrentView()}</>);
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <!--

  Produção (GitHub Pages) — exemplo já usado pelo projeto:

      https://viniciusrodriguesgithub.github.io
    URIs de redirecionamento autorizados (pode precisar de variantes se der erro):
      https://viniciusrodriguesgithub.github.io/PepperHat/consenso/syncpriv-app/
      (se necessário, adicione também sem barra final ou com .../index.html — igual à URL real da barra de endereço)

  Desenvolvimento local: acrescente também em Origens JS, ex.:
      http://localhost:5500
      http://127.0.0.1:5500
  (file:// não funciona com login Google.)

  ID do cliente: window.CONSENSO_GOOGLE_CLIENT_ID no <script> acima do #root.

  Publique as regras em syncpriv-app/firestore.rules no Console ou via firebase deploy.

  ================================================================
